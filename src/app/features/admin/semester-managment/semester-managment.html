<section class="space-y-4 w-[96%] mx-auto mb-3 mt-3 md:mt-5 lg:mt-8">
  <section>
    <app-semester-banner [activeSemester]="activeSemester()" [isLoading]="isLoading()" />
  </section>

  <main class="overflow-hidden rounded-2xl border border-border bg-card-bg shadow-sm">
    <app-semester-filter (add)="onAddSemester()" (search)="onSearch($event)" />
    <app-semester-table />
  </main>

  @if (showModal()) {
    <app-semester-modal (closed)="onModalClosed()" />
  }
</section>
