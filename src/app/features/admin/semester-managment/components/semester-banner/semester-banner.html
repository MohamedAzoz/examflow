@if (activeSemester(); as semester) {
  <div
    class="relative mx-auto w-[96%] overflow-hidden rounded-2xl bg-linear-to-br from-[#357B85] to-[#255a62] p-6 text-white shadow-[0_10px_30px_rgba(53,123,133,0.2)] transition-transform hover:-translate-y-0.5"
  >
    <div
      class="inline-flex w-fit items-center gap-2 rounded-full bg-white/20 px-2 py-1 text-[11px] font-medium tracking-wide backdrop-blur-sm"
    >
      <span class="h-2 w-2 rounded-full bg-emerald-400 shadow-[0_0_10px_#34D399]"></span>
      CURRENT ACTIVE SEMESTER
    </div>
    <h1 class="mt-3 text-3xl font-extrabold tracking-tight md:text-4xl">{{ semester.name }}</h1>
    <div class="mt-2 flex items-center gap-2 text-sm font-medium text-white/90">
      <i class="pi pi-calendar text-sm"></i>
      <span
        >{{ semester.startDate | date: 'MMM d' }} -
        {{ semester.endDate | date: 'MMM d, yyyy' }}</span
      >
    </div>
  </div>
} @else if (!isLoading()) {
  <div
    class="mx-auto flex min-h-44 w-[96%] items-center justify-center rounded-2xl border-2 border-dashed border-gray-300 bg-sidebar-bg px-4 py-8 text-center text-text-secondary"
  >
    <h2 class="text-lg font-semibold">No active semester currently</h2>
  </div>
}
