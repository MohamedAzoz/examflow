@if (loading()) {
  <div class="h-0.5 w-full animate-pulse bg-primary/70"></div>
}

<section class="overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full border-collapse" aria-label="Departments table">
      <thead class="bg-sidebar-bg">
        <tr class="border-b border-border">
          <th class="px-4 py-3 text-left text-xs font-semibold tracking-wide text-text-secondary">
            DEPARTMENT NAME
          </th>
          <th class="px-4 py-3 text-left text-xs font-semibold tracking-wide text-text-secondary">
            DEPARTMENT CODE
          </th>
          <th class="px-4 py-3 text-right text-xs font-semibold tracking-wide text-text-secondary">
            ACTIONS
          </th>
        </tr>
      </thead>

      <tbody>
        @for (department of filteredDepartments(); track trackByDepartmentId($index, department)) {
          <tr class="border-b border-border text-sm transition-colors hover:bg-surface">
            <td class="px-4 py-3">
              <span class="font-semibold text-text-dark">{{ department.name }}</span>
            </td>

            <td class="px-4 py-3">
              <span
                class="inline-flex rounded-full bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-700"
              >
                {{ department.code }}
              </span>
            </td>

            <td class="px-4 py-3">
              <div class="flex items-center justify-end gap-1">
                <button
                  type="button"
                  pButton
                  icon="pi pi-pencil"
                  class="p-button-text p-button-sm rounded-lg text-text-secondary! hover:bg-primary-light! hover:text-primary!"
                  (click)="openEditModal(department)"
                  aria-label="Edit department"
                ></button>
                <button
                  type="button"
                  pButton
                  icon="pi pi-trash"
                  class="p-button-text p-button-sm rounded-lg text-text-secondary! hover:bg-red-50! hover:text-red-500!"
                  (click)="deleteDepartment(department)"
                  aria-label="Delete department"
                ></button>
              </div>
            </td>
          </tr>
        } @empty {
          @if (!loading()) {
            <tr>
              <td colspan="3" class="px-6 py-14 text-center text-text-secondary">
                <div class="flex flex-col items-center gap-2">
                  <i class="pi pi-inbox text-3xl opacity-60"></i>
                  <p class="text-sm font-medium">No departments found</p>
                </div>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</section>
