<section class="space-y-4 w-[96%] mx-auto mt-3 md:mt-5 lg:mt-8">
  <main class="overflow-hidden rounded-2xl border border-border bg-card-bg shadow-sm">
    <app-department-filter (add)="onAddDepartment()" (search)="onSearch($event)" />
    <app-department-table [searchQuery]="searchQuery()" />
  </main>

  @if (showFormModal()) {
    <app-department-modal (closed)="onModalClosed()" />
  }
</section>
