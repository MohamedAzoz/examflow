<div
  class="fixed inset-0 z-1000 flex items-end justify-center bg-black/40 p-0 sm:items-center sm:p-4"
  (click)="closed.emit()"
>
  <div
    class="w-full max-h-[95vh] overflow-y-auto rounded-t-2xl bg-card-bg shadow-2xl sm:max-h-[90vh] sm:max-w-2xl sm:rounded-2xl"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
  >
    <div class="flex items-center justify-between border-b border-border px-4 py-4 sm:px-6">
      <h2 class="text-lg font-bold text-text-primary">Add New Student</h2>
      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-md text-text-secondary transition hover:bg-primary-light hover:text-primary"
        (click)="closed.emit()"
        aria-label="Close"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>

    <form class="space-y-4 px-4 py-5 sm:px-6" (ngSubmit)="submit()" novalidate>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="asm-nid"
            >National ID</label
          >
          <input
            id="asm-nid"
            type="text"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.nationalId"
            name="nationalId"
            placeholder="Enter National ID"
            required
            autocomplete="off"
          />
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="asm-univcode"
            >University Code</label
          >
          <input
            id="asm-univcode"
            type="text"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.univCode"
            name="univCode"
            placeholder="e.g. U2023..."
            required
            autocomplete="off"
          />
        </div>
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold text-text-primary" for="asm-fullname"
          >Full Name</label
        >
        <input
          id="asm-fullname"
          type="text"
          class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
          [(ngModel)]="form.fullName"
          name="fullName"
          placeholder="First Last"
          required
          autocomplete="off"
        />
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="asm-level"
            >Academic Level</label
          >
          <div class="relative">
            <select
              id="asm-level"
              class="w-full appearance-none rounded-lg border border-border bg-card-bg/50 px-3 py-2 pr-9 text-sm text-text-primary outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/15"
              [(ngModel)]="form.level"
              name="level"
              required
            >
              @for (lvl of academicLevels; track lvl.value) {
                <option [ngValue]="lvl.value">{{ lvl.label }}</option>
              }
            </select>
            <i
              class="pi pi-chevron-down pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-text-secondary"
            ></i>
          </div>
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="asm-dept"
            >Department</label
          >
          <div class="relative">
            <select
              id="asm-dept"
              class="w-full appearance-none rounded-lg border border-border bg-card-bg/50 px-3 py-2 pr-9 text-sm text-text-primary outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/15"
              [(ngModel)]="form.deptId"
              name="deptId"
              required
            >
              @for (d of departmentService.departments(); track $index) {
                <option [ngValue]="d.id">{{ d.name }}</option>
              }
            </select>
            <i
              class="pi pi-chevron-down pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-text-secondary"
            ></i>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="asm-email"
            >Email Address</label
          >
          <input
            id="asm-email"
            type="email"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.email"
            name="email"
            placeholder="student@univ.edu"
            required
            autocomplete="off"
          />
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="asm-phone"
            >Phone Number</label
          >
          <input
            id="asm-phone"
            type="tel"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.phone"
            name="phone"
            placeholder="+20 xxx xxx xxxx"
            autocomplete="off"
          />
        </div>
      </div>
    </form>

    <div class="flex items-center justify-end gap-2 border-t border-border px-4 py-4 sm:px-6">
      <button
        type="button"
        class="rounded-lg border border-border bg-card-bg/50 px-4 py-2 text-sm font-semibold text-text-secondary transition hover:border-gray-300 hover:text-text-primary"
        (click)="closed.emit()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-white transition hover:bg-primary-hover disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="!isFormValid() || submitting()"
        (click)="submit()"
      >
        @if (submitting()) {
          <span>Creating...</span>
        } @else {
          <span>Create Student</span>
        }
      </button>
    </div>
  </div>
</div>
