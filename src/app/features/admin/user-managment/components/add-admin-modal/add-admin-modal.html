<div
  class="fixed inset-0 z-1000 flex items-end justify-center bg-black/40 p-0 sm:items-center sm:p-4"
  (click)="closed.emit()"
>
  <div
    class="w-full max-h-[95vh] overflow-y-auto rounded-t-2xl bg-card-bg shadow-2xl sm:max-h-[90vh] sm:max-w-2xl sm:rounded-2xl"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
  >
    <div class="flex items-center justify-between border-b border-border px-4 py-4 sm:px-6">
      <h2 class="text-lg font-bold text-text-primary">Add New Admin</h2>
      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-md text-text-secondary transition hover:bg-primary-light hover:text-primary"
        (click)="closed.emit()"
        aria-label="Close"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>

    <form class="space-y-4 px-4 py-5 sm:px-6" (ngSubmit)="submit()" novalidate>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="adm-nid"
            >National ID</label
          >
          <input
            id="adm-nid"
            type="text"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.nationalId"
            name="nationalId"
            placeholder="Enter National ID"
            required
            autocomplete="off"
          />
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="adm-univcode"
            >University Code</label
          >
          <input
            id="adm-univcode"
            type="text"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.universityCode"
            name="universityCode"
            placeholder="e.g. U2023..."
            required
            autocomplete="off"
          />
        </div>
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold text-text-primary" for="adm-fullname"
          >Full Name</label
        >
        <input
          id="adm-fullname"
          type="text"
          class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
          [(ngModel)]="form.fullName"
          name="fullName"
          placeholder="First Last"
          required
          autocomplete="off"
        />
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold text-text-primary" for="adm-job"
          >Job Title</label
        >
        <input
          id="adm-job"
          type="text"
          class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
          [(ngModel)]="form.jobTitle"
          name="jobTitle"
          required
          placeholder="Enter Job Title"
          autocomplete="off"
        />
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="adm-email"
            >Email Address</label
          >
          <input
            id="adm-email"
            type="email"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.email"
            name="email"
            placeholder="admin@univ.edu"
            required
            autocomplete="off"
          />
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-text-primary" for="adm-phone"
            >Phone Number</label
          >
          <input
            id="adm-phone"
            type="tel"
            class="w-full rounded-lg border border-border bg-card-bg/50 px-3 py-2 text-sm text-text-primary outline-none transition placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/15"
            [(ngModel)]="form.phoneNumber"
            name="phoneNumber"
            placeholder="+20 xxx xxx xxxx"
            autocomplete="off"
          />
        </div>
      </div>
    </form>

    <div class="flex items-center justify-end gap-2 border-t border-border px-4 py-4 sm:px-6">
      <button
        type="button"
        class="rounded-lg border border-border bg-card-bg/50 px-4 py-2 text-sm font-semibold text-text-secondary transition hover:border-gray-300 hover:text-text-primary"
        (click)="closed.emit()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-white transition hover:bg-primary-hover disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="!isFormValid() || submitting()"
        (click)="submit()"
      >
        @if (submitting()) {
          <span>Creating...</span>
        } @else {
          <span>Create Admin</span>
        }
      </button>
    </div>
  </div>
</div>
