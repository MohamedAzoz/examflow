<div
  class="fixed inset-0 z-1000 flex items-center justify-center bg-black/35 p-4"
  (click)="onBackdropClick()"
>
  <div
    class="w-full max-w-md overflow-hidden rounded-xl border border-border bg-white shadow-2xl"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
  >
    <div class="flex items-center justify-between border-b border-border px-5 py-4">
      <h3 class="text-base font-bold text-text-primary">{{ config().title }}</h3>
      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-md text-text-secondary transition hover:bg-primary-light hover:text-primary"
        (click)="closed.emit()"
        aria-label="Close"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="space-y-5 px-5 py-5">
      <div class="space-y-2">
        <label class="block text-xs font-semibold text-text-primary">Sort By</label>
        <div class="relative">
          <select
            class="w-full appearance-none rounded-lg border border-border bg-white px-3 py-2 pr-9 text-sm text-text-primary outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/15"
            [ngModel]="selectedSort()"
            (ngModelChange)="selectedSort.set($event)"
          >
            @for (opt of config().sortOptions; track $index) {
              <option [ngValue]="opt.value">{{ opt.label }}</option>
            }
          </select>
          <i
            class="pi pi-chevron-down pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-text-secondary"
          ></i>
        </div>
      </div>

      @if (config().showAcademicLevel && config().academicLevels.length > 0) {
        <div class="space-y-2">
          <label class="block text-xs font-semibold text-text-primary">Academic Level</label>
          <div class="flex flex-wrap gap-2">
            @for (level of config().academicLevels; track $index) {
              <button
                type="button"
                class="rounded-full border px-4 py-1.5 text-xs font-medium transition"
                [class.border-primary]="isLevelSelected(level)"
                [class.bg-primary]="isLevelSelected(level)"
                [class.text-white]="isLevelSelected(level)"
                [class.border-border]="!isLevelSelected(level)"
                [class.text-text-secondary]="!isLevelSelected(level)"
                [class.hover:border-primary]="!isLevelSelected(level)"
                [class.hover:text-primary]="!isLevelSelected(level)"
                (click)="toggleLevel(level)"
              >
                Level {{ level }}
              </button>
            }
          </div>
        </div>
      }

      @if (config().departments.length > 0) {
        <div class="space-y-2">
          <label class="block text-xs font-semibold text-text-primary">Department</label>
          <div class="flex flex-wrap gap-2">
            @for (dept of config().departments; track $index) {
              <button
                type="button"
                class="rounded-full border px-4 py-1.5 text-xs font-medium transition"
                [class.border-primary]="isDeptSelected(dept.id)"
                [class.bg-primary]="isDeptSelected(dept.id)"
                [class.text-white]="isDeptSelected(dept.id)"
                [class.border-border]="!isDeptSelected(dept.id)"
                [class.text-text-secondary]="!isDeptSelected(dept.id)"
                [class.hover:border-primary]="!isDeptSelected(dept.id)"
                [class.hover:text-primary]="!isDeptSelected(dept.id)"
                (click)="toggleDept(dept.id)"
              >
                {{ dept.code }}
              </button>
            }
          </div>
        </div>
      }
    </div>

    <div class="flex items-center justify-end gap-2 border-t border-border px-5 py-4">
      <button
        type="button"
        class="px-4 py-2 text-sm font-medium text-text-secondary transition hover:text-primary"
        (click)="onReset()"
      >
        Reset
      </button>
      <button
        type="button"
        class="rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-white transition hover:bg-primary-hover"
        (click)="onApply()"
      >
        Show Results
      </button>
    </div>
  </div>
</div>
