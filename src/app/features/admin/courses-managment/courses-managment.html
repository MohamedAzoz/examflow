<section class="space-y-4 w-[96%] mx-auto mt-3 md:mt-5 lg:mt-8">
  <main class="overflow-hidden rounded-2xl border border-border bg-card-bg shadow-sm">
    <app-course-filter (add)="onAddCourse()" (search)="onSearchChanges($event)" />
    <app-course-table />
  </main>

  @if (showModal()) {
    <app-course-modal (closed)="onModalClosed()" />
  }
</section>
