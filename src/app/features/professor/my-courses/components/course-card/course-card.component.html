<article
  class="h-full rounded-3xl border border-border/65 bg-card-bg p-5 md:p-6 flex flex-col transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-primary/5"
>
  <header class="mb-5 flex items-start justify-between gap-4">
    <div
      class="flex h-13 w-13 items-center justify-center rounded-2xl bg-primary-light text-primary"
    >
      <i [class]="'pi ' + resolveIcon(course.courseId)" class="text-xl" aria-hidden="true"></i>
    </div>

    <span
      class="inline-flex items-center rounded-full border border-border/70 bg-surface-container px-3 py-1 text-[11px] font-bold uppercase tracking-wide text-text-secondary"
    >
      {{ resolveLevelLabel(course.courseCode) }}
    </span>
  </header>

  <div class="space-y-1.5">
    <h3 class="text-2xl font-black leading-tight text-text-primary line-clamp-2">
      {{ course.courseName }}
    </h3>
    <p class="text-sm font-semibold tracking-wide text-primary/75 uppercase">
      {{ course.courseCode }}
    </p>
  </div>

  <div class="mt-6 flex items-center gap-2 text-sm text-text-secondary">
    <i class="pi pi-book text-xs" aria-hidden="true"></i>
    <span>Course ID: {{ course.courseId }}</span>
  </div>

  <div class="mt-auto pt-6 grid grid-cols-2 gap-2.5">
    <button
      type="button"
      class="btn rounded-xl border border-border bg-surface-container px-3 py-2.5 text-xs font-bold uppercase tracking-wide text-text-secondary cursor-not-allowed opacity-75"
      disabled
      aria-label="Question Bank coming soon"
    >
      Question Bank
    </button>

    <button
      type="button"
      class="btn rounded-xl bg-primary px-3 py-2.5 text-xs font-bold uppercase tracking-wide text-white cursor-not-allowed opacity-85"
      disabled
      aria-label="Create Exam coming soon"
    >
      Create Exam
    </button>
  </div>
</article>
