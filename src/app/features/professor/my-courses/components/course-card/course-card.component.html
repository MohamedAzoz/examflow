<a
  [routerLink]="[
    '/',
    routes.MAIN.path,
    routes.PROFESSOR.path,
    professorRoutes.COURSES.path,
    course.courseId,
  ]"
  class="group h-full rounded-xl border border-border/65 bg-card-bg p-5 md:p-6 flex flex-col transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-primary/5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/35"
  [attr.aria-label]="'Open details for ' + course.courseName"
>
  <header class="mb-5 flex items-start justify-between gap-4">
    <div
      class="flex h-13 w-13 items-center justify-center rounded-2xl bg-primary-light text-primary transition-transform duration-300 group-hover:scale-105"
    >
      <i [class]="'pi ' + resolveIcon(course.courseId)" class="text-xl" aria-hidden="true"></i>
    </div>

    <span
      class="inline-flex items-center rounded-full border border-border/70 bg-surface-container px-3 py-1 text-[11px] font-bold uppercase tracking-wide text-text-secondary"
    >
      {{ resolveLevelLabel() }}
    </span>
  </header>

  <div class="space-y-1.5">
    <h3 class="text-2xl font-black leading-tight text-text-primary line-clamp-2">
      {{ course.courseName }}
    </h3>
    <p class="text-sm font-semibold tracking-wide text-primary/75 uppercase">
      {{ course.courseCode }}
    </p>
  </div>

  <div class="mt-auto pt-5 flex items-center justify-between text-primary">
    <span class="text-xs font-bold uppercase tracking-wider">Open Course Workspace</span>
    <i
      class="pi pi-arrow-right text-sm transition-transform duration-300 group-hover:translate-x-1"
    ></i>
  </div>
</a>
