<aside
  class="flex h-screen min-h-0 flex-col border border-border/70 bg-card-bg p-3 shadow-sm md:p-4"
>
  <header class="mb-3 flex items-start justify-between gap-2">
    <div>
      <h2 class="text-xl font-black text-text-primary">Exam Settings</h2>
      <p class="text-xs text-text-secondary">Save updates and publish when ready.</p>
    </div>
    <i class="pi pi-info-circle text-text-secondary"></i>
  </header>

  @if (exam) {
    <div class="mb-3 rounded-xl border border-border/70 bg-surface/55 p-3">
      <p class="text-[11px] font-bold uppercase tracking-wide text-text-secondary">Status</p>
      <p class="mt-1 text-sm font-semibold text-text-primary">{{ exam.examStatus }}</p>
    </div>
  }

  <form class="min-h-0 flex-1 space-y-3 overflow-y-auto" [formGroup]="form" (ngSubmit)="onSave()">
    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-text-secondary"
        >Exam Title</label
      >
      <input
        formControlName="title"
        type="text"
        class="h-10 w-full rounded-xl border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none transition focus:border-primary/35"
      />
    </div>

    <div class="grid grid-cols-2 gap-2">
      <div>
        <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-text-secondary"
          >Passing Score</label
        >
        <input
          formControlName="passingScore"
          type="number"
          min="1"
          max="100"
          class="h-10 w-full rounded-xl border border-border/70 bg-surface px-3 text-sm text-text-primary"
        />
      </div>

      <div>
        <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-text-secondary"
          >Total Degree</label
        >
        <input
          formControlName="totalDegree"
          type="number"
          min="1"
          class="h-10 w-full rounded-xl border border-border/70 bg-surface px-3 text-sm text-text-primary"
        />
      </div>
    </div>

    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-text-secondary"
        >Start Time</label
      >
      <input
        formControlName="startTime"
        type="datetime-local"
        class="h-10 w-full rounded-xl border border-border/70 bg-surface px-3 text-sm text-text-primary"
      />
    </div>

    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-text-secondary"
        >Duration (Minutes)</label
      >
      <input
        formControlName="durationMinutes"
        type="number"
        min="1"
        class="h-10 w-full rounded-xl border border-border/70 bg-surface px-3 text-sm text-text-primary"
      />
    </div>

    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-text-secondary"
        >Academic Level</label
      >
      <div
        class="flex h-10 items-center rounded-xl border border-border/70 bg-surface px-3 text-sm font-semibold text-text-primary"
      >
        Level 4
      </div>
    </div>

    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-text-secondary"
        >Department</label
      >
      <select
        formControlName="departmentId"
        class="h-10 w-full rounded-xl border border-border/70 bg-surface px-3 text-sm text-text-primary"
      >
        <option [value]="0" disabled>Select department</option>
        @for (department of departments; track department.id) {
          <option [value]="department.id">{{ department.name }}</option>
        }
      </select>
    </div>

    <label
      class="flex items-center justify-between gap-2 rounded-xl border border-border/60 bg-surface/40 p-2.5"
    >
      <div>
        <p class="text-sm font-semibold text-text-primary">Randomize Questions</p>
        <p class="text-xs text-text-secondary">Shuffle order per student.</p>
      </div>
      <input type="checkbox" formControlName="isRandomQuestions" class="h-4 w-4 accent-primary" />
    </label>

    <label
      class="flex items-center justify-between gap-2 rounded-xl border border-border/60 bg-surface/40 p-2.5"
    >
      <div>
        <p class="text-sm font-semibold text-text-primary">Randomize Answers</p>
        <p class="text-xs text-text-secondary">Shuffle MCQ options.</p>
      </div>
      <input type="checkbox" formControlName="isRandomAnswers" class="h-4 w-4 accent-primary" />
    </label>

    <button
      type="submit"
      class="btn h-11 w-full rounded-xl bg-primary font-semibold text-white transition hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="saving"
    >
      @if (saving) {
        <i class="pi pi-spin pi-spinner mr-1.5"></i>
      }
      Save Updates
    </button>

    <button
      type="button"
      class="btn h-11 w-full rounded-xl border border-emerald-200 bg-emerald-50 font-semibold text-emerald-700 transition hover:bg-emerald-100 disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="publishing"
      (click)="onPublish()"
    >
      @if (publishing) {
        <i class="pi pi-spin pi-spinner mr-1.5"></i>
      }
      Publish Exam
    </button>
  </form>
</aside>
