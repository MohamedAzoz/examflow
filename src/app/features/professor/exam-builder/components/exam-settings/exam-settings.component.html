@if (!isCollapsed()) {
  <div class="relative h-full border-l border-border bg-card-bg md:w-80">
    <aside class="h-full overflow-y-auto p-4">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-xl font-semibold text-text-primary">Exam Settings</h2>
        <button
          type="button"
          class="btn h-8 w-8 rounded-lg text-text-secondary transition hover:bg-surface"
          aria-label="Collapse settings"
          (click)="collapse()"
        >
          <i class="pi pi-times text-sm" aria-hidden="true"></i>
        </button>
      </div>

      <div class="space-y-2">
        <div class="rounded-xl border border-border bg-surface p-3">
          <p class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary">
            Active Course
          </p>
          <p class="mt-1 truncate text-sm font-semibold text-text-primary">
            {{ activeCourseName() || 'Unknown Course' }}
          </p>
        </div>

        <button
          type="button"
          class="btn h-11 w-full rounded-xl bg-primary px-4 text-sm font-semibold text-white transition hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="!canSave()"
          (click)="onSaveUpdates()"
        >
          @if (saving()) {
            Saving Updates...
          } @else {
            Save Updates
          }
        </button>

        <div class="space-y-2 rounded-xl border border-border bg-surface p-3">
          <label class="block space-y-1">
            <span class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Exam Title</span
            >
            <input
              type="text"
              class="h-10 w-full rounded-md border border-border bg-card-bg px-3 text-sm text-text-primary outline-none"
              [formControl]="titleControl"
              placeholder="Enter exam title"
            />
          </label>

          <div class="grid grid-cols-2 gap-2">
            <label class="space-y-1">
              <span class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary"
                >Passing Score</span
              >
              <input
                type="number"
                min="1"
                max="100"
                class="h-10 w-full rounded-md border border-border bg-card-bg px-3 text-sm text-text-primary outline-none"
                [formControl]="passingScoreControl"
              />
            </label>

            <label class="space-y-1">
              <span class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary"
                >Total Degree</span
              >
              <input
                type="number"
                min="1"
                class="h-10 w-full rounded-md border border-border bg-card-bg px-3 text-sm text-text-primary outline-none"
                [formControl]="totalDegreeControl"
              />
            </label>
          </div>

          <label class="block space-y-1">
            <span class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Start Time</span
            >
            <input
              type="datetime-local"
              class="h-10 w-full rounded-md border border-border bg-card-bg px-3 text-sm text-text-primary outline-none"
              [formControl]="startTimeControl"
            />
          </label>

          <label class="block space-y-1">
            <span class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Duration (Minutes)</span
            >
            <input
              type="number"
              min="1"
              class="h-10 w-full rounded-md border border-border bg-card-bg px-3 text-sm text-text-primary outline-none"
              [formControl]="durationMinutesControl"
            />
          </label>

          <label class="block space-y-1">
            <span class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Academic Level</span
            >
            <select
              class="h-10 w-full rounded-md border border-border bg-card-bg px-3 text-sm text-text-primary outline-none"
              [formControl]="academicLevelControl"
            >
              @for (level of levelOptions; track level) {
                <option [ngValue]="level">Level {{ level }}</option>
              }
            </select>
          </label>

          <label class="block space-y-1">
            <span class="text-[11px] font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Departments</span
            >
            <div class="max-h-32 overflow-y-auto rounded-md border border-border bg-card-bg p-2 space-y-1">
              @for (department of departments(); track department.id) {
                <label class="flex cursor-pointer items-center gap-3 rounded px-2 py-1.5 transition hover:bg-surface">
                  <input
                    type="checkbox"
                    class="h-4 w-4 cursor-pointer accent-primary"
                    [checked]="(departmentIdsControl.value || []).includes(department.id)"
                    (change)="toggleDepartment(department.id)"
                  />
                  <span class="text-sm font-medium text-text-primary">{{ department.name }}</span>
                </label>
              }
              @if (departments().length === 0) {
                <p class="p-2 text-xs text-text-secondary">No departments found.</p>
              }
            </div>
            <p class="text-xs text-text-secondary">Selected: {{ selectedDepartmentName() }}</p>
          </label>
        </div>

        <label
          class="flex items-center justify-between gap-2 rounded-xl border border-border bg-surface p-3"
        >
          <div>
            <p class="text-sm font-semibold text-text-primary">Randomize Questions</p>
            <p class="text-xs text-text-secondary">Shuffle question order per student</p>
          </div>
          <input
            type="checkbox"
            class="h-5 w-5 accent-primary"
            [formControl]="isRandomQuestionsControl"
          />
        </label>

        <label
          class="flex items-center justify-between gap-2 rounded-xl border border-border bg-surface p-3"
        >
          <div>
            <p class="text-sm font-semibold text-text-primary">Randomize Answers</p>
            <p class="text-xs text-text-secondary">Shuffle MCQ options per student</p>
          </div>
          <input
            type="checkbox"
            class="h-5 w-5 accent-primary"
            [formControl]="isRandomAnswersControl"
          />
        </label>
      </div>
    </aside>
  </div>
} @else {
  <div class="flex h-full items-start justify-center p-3">
    <button
      type="button"
      class="btn mt-2 inline-flex items-center gap-2 rounded-lg border border-border bg-surface px-3 py-2 text-sm font-semibold text-text-primary transition hover:bg-surface-container"
      (click)="expand()"
    >
      &lt; Settings
    </button>
  </div>
}
