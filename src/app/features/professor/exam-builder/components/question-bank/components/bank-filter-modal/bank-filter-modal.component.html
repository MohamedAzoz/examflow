<div
  class="fixed inset-0 z-100 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-opacity"
  (click)="onClose()"
>
  <div
    class="w-full max-w-md scale-100 rounded-3xl bg-card-bg shadow-2xl transition-all duration-300"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <header class="flex items-center justify-between border-b border-border px-6 py-5">
      <h3 class="text-xl font-bold text-text-primary">Filter Questions</h3>
      <button
        type="button"
        class="flex h-9 w-9 items-center justify-center rounded-full text-text-secondary transition hover:bg-surface-container"
        (click)="onClose()"
      >
        <i class="pi pi-times text-sm" aria-hidden="true"></i>
      </button>
    </header>

    <!-- Body -->
    <div class="px-6 py-8 space-y-6">
      <div class="space-y-3">
        <div class="flex items-center gap-2">
           <i class="pi pi-list text-primary/70 text-sm"></i>
           <label class="text-[11px] font-bold uppercase tracking-widest text-text-secondary">Question Type</label>
        </div>
        
        <div class="relative">
          <select
            [ngModel]="tempSelectedType()"
            (ngModelChange)="tempSelectedType.set($event)"
            class="h-14 w-full appearance-none rounded-xl border border-border bg-surface px-4 text-sm font-medium text-text-primary outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/10"
          >
            @for (option of options; track option.value) {
              <option [ngValue]="option.value">{{ option.label }}</option>
            }
          </select>
          <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2 text-text-secondary">
             <span class="h-4 w-px bg-border"></span>
             <i class="pi pi-chevron-down text-xs"></i>
          </div>
        </div>
      </div>
      
      <p class="text-xs text-text-secondary leading-relaxed bg-surface-container/50 p-3 rounded-lg border border-border/50">
        <i class="pi pi-info-circle mr-1"></i>
        Filtering helps you find specific questions from the bank to assign to your exam.
      </p>
    </div>

    <!-- Footer -->
    <footer class="flex items-center justify-between border-t border-border bg-surface/30 px-6 py-5 rounded-b-3xl">
      <button
        type="button"
        class="text-sm font-bold btn text-text-secondary transition hover:text-red-500 hover:underline flex items-center gap-2"
        (click)="onClearAll()"
      >
        <span>Clear All</span>
      </button>

      <button
        type="button"
        class="h-12 rounded-xl btn bg-primary px-8 text-sm font-bold text-white transition hover:brightness-110 active:scale-95 shadow-lg shadow-primary/25"
        (click)="onApply()"
      >
        Apply Filters
      </button>
    </footer>
  </div>
</div>
