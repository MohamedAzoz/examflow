<aside
  class="flex h-screen  min-h-0 flex-col border border-border/70 bg-card-bg p-3 shadow-sm md:p-4"
>
  <header class="mb-3 space-y-2">
    <h2 class="text-lg font-black text-text-primary">Course Question Bank</h2>

    <div class="relative">
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-text-secondary/70"></i>
      <input
        type="search"
        [value]="searchValue"
        (input)="onSearchInput($any($event.target).value)"
        placeholder="Search questions..."
        class="h-10 w-full rounded-xl border border-border/70 bg-surface pl-9 pr-3 text-sm text-text-primary outline-none transition focus:border-primary/35"
      />
    </div>

    <select
      [value]="selectedQuestionType"
      (change)="onQuestionTypeChange($any($event.target).value)"
      class="h-10 w-full rounded-xl border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none transition focus:border-primary/35"
      aria-label="Filter by question type"
    >
      @for (option of typeOptions; track option.value) {
        <option [value]="option.value">{{ option.label }}</option>
      }
    </select>
  </header>

  <div
    class="min-h-0 flex-1 space-y-2 overflow-y-auto rounded-xl border border-border/60 bg-surface/35 p-2"
    (scroll)="onScroll($event)"
  >
    @for (question of questions; track question.id) {
      <label
        class="block cursor-pointer rounded-xl border border-border/40 bg-card-bg p-2.5 transition hover:border-primary/30 hover:bg-primary/5"
      >
        <div class="flex items-start gap-2.5">
          <input
            type="checkbox"
            [checked]="isSelected(question.id)"
            (change)="onToggleSelection(question.id)"
            class="mt-1 h-4 w-4 rounded border-border accent-primary"
          />

          <div class="min-w-0 flex-1">
            <p class="line-clamp-2 text-sm font-semibold text-text-primary">
              {{ question.text }}
            </p>

            <div class="mt-1.5 flex items-center gap-2 text-[11px] font-semibold">
              <span class="rounded-md bg-primary/10 px-2 py-0.5 text-primary">
                {{ typeLabel(question.questionType) }}
              </span>
              <span class="text-text-secondary">{{ question.degree }} pts</span>
            </div>
          </div>
        </div>
      </label>
    } @empty {
      @if (!loading) {
        <p class="px-2 py-8 text-center text-sm text-text-secondary">No questions found.</p>
      }
    }

    @if (loading) {
      <div class="flex items-center justify-center py-4">
        <i class="pi pi-spin pi-spinner text-primary"></i>
      </div>
    }

    @if (!loading && !hasMore && questions.length > 0) {
      <p class="py-2 text-center text-xs font-medium text-text-secondary">End of question list</p>
    }
  </div>

  <footer class="mt-3 space-y-2">
    <button
      type="button"
      class="btn h-11 w-full rounded-xl bg-primary font-semibold text-white transition hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-50"
      [disabled]="selectedCount() === 0 || assigning"
      (click)="assignSelectedQuestions.emit()"
    >
      @if (assigning) {
        <i class="pi pi-spin pi-spinner mr-1.5"></i>
      }
      Assign Selected ({{ selectedCount() }})
    </button>

    <button
      type="button"
      class="btn h-11 w-full rounded-xl border border-dashed border-primary/50 bg-primary/5 font-semibold text-primary transition hover:bg-primary/10"
      (click)="createQuestion.emit()"
    >
      <i class="pi pi-plus mr-1.5"></i>
      Create New Question
    </button>

    <button
      type="button"
      class="btn h-10 w-full rounded-xl border border-border/80 bg-surface text-sm font-semibold text-text-secondary transition hover:bg-surface-container"
      (click)="exitBuilder.emit()"
    >
      <i class="pi pi-arrow-left mr-1.5"></i>
      Exit Builder
    </button>
  </footer>
</aside>
