<div class="h-dvh w-full overflow-hidden bg-surface">
  <header
    class="flex h-14 items-center justify-between gap-3 border-b border-border bg-card-bg px-4 md:px-6"
  >
    <div class="flex min-w-0 items-center gap-3">
      <button
        type="button"
        class="btn inline-flex h-9 items-center gap-2 rounded-lg border border-border bg-surface px-3 text-xs font-semibold text-text-secondary transition hover:bg-surface-container"
        (click)="exitBuilder()"
      >
        <i class="pi pi-arrow-left text-[10px]" aria-hidden="true"></i>
        Back
      </button>

      <div class="min-w-0">
        <p class="truncate text-sm font-bold text-text-primary">
          {{ exam()?.title || 'Exam Builder' }}
        </p>
        <p class="truncate text-[11px] text-text-secondary">
          {{ exam()?.courseName || 'Unknown Course' }}
        </p>
      </div>

      <span
        class="hidden rounded-md bg-surface-container px-2 py-0.5 text-[11px] font-bold text-text-secondary md:inline-flex"
      >
        {{ statusLabel() }}
      </span>
    </div>

    <div
      class="hidden rounded-full bg-primary-light px-4 py-1 text-sm font-semibold text-primary md:block"
    >
      Total Assigned Degrees: {{ totalAssignedDegree() }}
    </div>

    <button
      type="button"
      class="btn rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="facade.publishingExam() || isLoadingWorkspace()"
      (click)="publishExam()"
    >
      @if (facade.publishingExam()) {
        Publishing...
      } @else {
        Publish Exam
      }
    </button>
  </header>

  @if (errorMessage()) {
    <div class="border-b border-red-200 bg-red-50 px-4 py-2 text-xs font-medium text-red-600">
      {{ errorMessage() }}
    </div>
  }

  <section class="relative flex h-[calc(100dvh-56px)] flex-col md:flex-row">
    <aside
      class="relative shrink-0 overflow-hidden bg-card-bg transition-[width] duration-200"
      [class.w-0]="isQuestionBankCollapsed()"
      [class.w-full]="!isQuestionBankCollapsed()"
      [class.md:w-80]="!isQuestionBankCollapsed()"
      [class.md:border-r]="!isQuestionBankCollapsed()"
      [class.md:border-border]="!isQuestionBankCollapsed()"
    >
      @if (!isQuestionBankCollapsed()) {
        <app-question-bank
          [examId]="examId()"
          [courseId]="courseId()"
          (assignDone)="onQuestionsAssigned()"
          (createNewQuestion)="requestCreateQuestionFromBank()"
          (closeRequested)="onQuestionBankCloseRequested()"
        ></app-question-bank>
      }
    </aside>

    @if (isQuestionBankCollapsed()) {
      <button
        type="button"
        class="btn absolute left-2 top-3 z-10 inline-flex h-9 items-center gap-2 rounded-lg border border-border bg-card-bg px-3 text-xs font-semibold text-text-primary shadow-sm"
        (click)="expandQuestionBank()"
      >
        <i class="pi pi-angle-right text-[10px]" aria-hidden="true"></i>
        Question Bank
      </button>
    }

    <main class="min-h-0 min-w-0 flex-1 overflow-hidden">
      <app-assigned-questions
        [assignedQuestions]="assignedQuestions()"
        [courseId]="courseId()"
        [openCreateRequestTick]="createQuestionRequestTick()"
        (questionsChange)="onAssignedQuestionsChange($event)"
      ></app-assigned-questions>
    </main>

    <div class="w-full border-t border-border bg-card-bg md:w-80 md:border-l md:border-t-0">
      <app-exam-settings
        [initialSettings]="examSettingsInitial()"
        [departments]="departments()"
        [activeCourseName]="exam()?.courseName || ''"
        [saving]="facade.savingExam()"
        [publishing]="facade.publishingExam()"
        (saveUpdates)="onExamSettingsSave($event)"
        (publishExam)="publishExam()"
      ></app-exam-settings>
    </div>
  </section>
</div>
