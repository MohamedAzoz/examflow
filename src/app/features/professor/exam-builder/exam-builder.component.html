<section class="exam-builder-shell min-h-dvh w-screen">
  <header
    class="sticky top-0 z-40 flex flex-wrap items-center justify-between gap-3 border border-border/70 bg-card-bg px-3 py-2.5 backdrop-blur supports-backdrop-filter:bg-card-bg/95 md:px-4"
  >
    <div class="flex flex-wrap items-center gap-2">
      <span
        class="inline-flex rounded-full bg-primary/10 px-2.5 py-1 text-xs font-bold text-primary"
      >
        EXAMFLOW
      </span>

      <span class="rounded bg-surface px-2 py-1 text-[11px] font-semibold text-text-secondary">
        {{ exam()?.examStatus || 'Draft' }}
      </span>

      @if (exam()?.title) {
        <span class="rounded bg-primary/10 px-2 py-1 text-[11px] font-semibold text-primary">
          {{ exam()?.title }}
        </span>
      }
    </div>

    <div class="flex items-center gap-2">
      <div class="rounded-full bg-primary/8 px-3 py-1 text-xs font-bold text-primary">
        Total Assigned Degrees: {{ totalAssignedDegree() }}
      </div>

      <div class="rounded-full bg-surface px-3 py-1 text-xs font-semibold text-text-secondary">
        Questions: {{ assignedQuestions().length }}
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button
        type="button"
        class="btn h-10 rounded-xl border border-border/80 bg-surface px-3 text-sm font-semibold text-text-secondary"
        (click)="toggleSettingsPanel()"
      >
        <i class="pi pi-cog mr-1.5"></i>
        {{ rightPanelOpen() ? 'Hide Settings' : 'Show Settings' }}
      </button>

      <button
        type="button"
        class="btn h-10 rounded-xl bg-emerald-600 px-4 text-sm font-semibold text-white transition hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="!canPublish()"
        (click)="onPublishExam()"
      >
        @if (publishingExam()) {
          <i class="pi pi-spin pi-spinner mr-1.5"></i>
        }
        Publish Exam
      </button>
    </div>
  </header>

    <div
      class="mt-3 flex items-center justify-between gap-2 rounded-xl border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700"

        <i class="pi pi-times"></i>
      </button>

  }

  @if (error()) {
    <div
      class="flex items-center justify-between gap-2 rounded-xl border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"
    >
      <span>{{ error() }}</span>
      <button
        type="button"
        class="btn h-8 w-8 rounded-lg"
        (click)="clearError()"
        aria-label="Dismiss"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>
  }

  @if (departmentsError()) {
    <div
      class="mt-3 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-700"
    >
      {{ departmentsError() }}
    </div>
  }

  @if (!canPublish() && !publishingExam()) {
    <div
      class="mt-3 rounded-xl border border-border/70 bg-surface/80 px-3 py-2 text-sm text-text-secondary"
    >
      Add at least one question before publishing this exam.
    </div>
  }

  @if (isWorkspaceLoading() && !exam()) {
    <div class="flex min-h-[40dvh] items-center justify-center">
      <div class="flex items-center gap-2 rounded-xl border border-border/70 bg-card-bg px-4 py-3">
        <i class="pi pi-spin pi-spinner text-primary"></i>
        <span class="text-sm font-semibold text-text-secondary">Loading exam workspace...</span>
      </div>
    </div>
  } -->

  <div
    [class]="
      rightPanelOpen()
        ? 'grid gap-3 lg:grid-cols-[290px_minmax(0,1fr)_330px] lg:items-start'
        : 'grid gap-3 lg:grid-cols-[290px_minmax(0,1fr)] lg:items-start'
    "
  >
    <div class="lg:sticky lg:top-21 lg:h-[calc(100dvh-5.75rem)]">
      <app-question-bank-panel
        [questions]="questionBank()"
        [selectedQuestionIds]="selectedQuestionIds()"
        [searchValue]="questionSearch()"
        [selectedQuestionType]="questionType()"
        [loading]="loadingQuestionBank()"
        [hasMore]="hasMoreQuestions()"
        [assigning]="assigningQuestions()"
        (searchChanged)="onSearchChanged($event)"
        (questionTypeChanged)="onQuestionTypeChanged($event)"
        (toggleQuestionSelection)="onToggleQuestionSelection($event)"
        (loadMoreQuestions)="onLoadMoreQuestions()"
        (assignSelectedQuestions)="onAssignSelectedQuestions()"
        (createQuestion)="onOpenCreateQuestion()"
        (exitBuilder)="exitBuilder()"
      ></app-question-bank-panel>
    </div>

    <div class="min-w-0">
      <app-question-workspace
        [selectedQuestionsPreview]="selectedQuestionPreview()"
        [selectedQuestionDegrees]="selectedQuestionDegrees()"
        [assignedQuestions]="assignedQuestions()"
        [createVisible]="isCreateQuestionVisible()"
        [savingQuestion]="savingQuestion()"
        (selectedQuestionDegreeChanged)="onSelectedQuestionDegreeChanged($event)"
        (closeCreate)="onCloseCreateQuestion()"
        (submitCreateQuestion)="onCreateQuestion($event)"
        (submitUpdateQuestion)="onUpdateQuestion($event)"
      ></app-question-workspace>
    </div>

    @if (rightPanelOpen()) {
      <div class="lg:sticky lg:top-21 lg:h-[calc(100dvh-5.75rem)]">
        <app-exam-settings-panel
          [exam]="exam()"
          [departments]="departments()"
          [saving]="savingExam()"
          [publishing]="publishingExam()"
          (saveSettings)="onSaveSettings($event)"
          (publishExam)="onPublishExam()"
        ></app-exam-settings-panel>
      </div>
    }
  </div>
</section>
