<header
  class="rounded-3xl border border-border/65 bg-card-bg p-6 md:p-8 flex flex-col gap-4 md:flex-row md:items-start md:justify-between"
>
  <div class="space-y-1.5">
    <div class="flex items-center gap-2 text-sm text-text-secondary">
      <i class="pi pi-book" aria-hidden="true"></i>
      <span>{{ course().code }}</span>
    </div>

    <h1 class="text-3xl md:text-4xl font-black text-text-primary tracking-tight leading-tight">
      {{ course().name }}
    </h1>

    <p class="text-text-secondary text-sm md:text-base">
      Manage course materials, question banks, and active assessments.
    </p>
  </div>

  <div class="flex flex-col gap-2 md:items-end">
    <span
      class="inline-flex items-center rounded-full border border-border/70 bg-surface-container px-4 py-1.5 text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
    >
      {{ resolveLevelLabel() }}
    </span>

    <span
      class="inline-flex items-center gap-2 rounded-xl bg-primary-light px-4 py-2 text-xs md:text-sm font-semibold text-primary"
    >
      <i class="pi pi-check-circle text-[12px]" aria-hidden="true"></i>
      Fall Semester Active
    </span>
  </div>
</header>
