<section class="max-w-350 mx-auto min-h-full p-4 md:p-6 lg:p-8">
  <header
    class="mb-5 flex flex-col gap-3 rounded-2xl border border-border/70 bg-card-bg p-4 md:flex-row md:items-center md:justify-between md:p-5"
  >
    <div>
      <h1 class="text-3xl font-black tracking-tight text-text-primary">Exams Management</h1>
      <p class="mt-1 text-sm text-text-secondary">
        Create exams and continue directly to the full builder.
      </p>
    </div>

    <button
      type="button"
      class="btn inline-flex h-9 items-center justify-center gap-1.5 rounded-xl bg-emerald-600 px-3.5 text-sm font-semibold text-white shadow-lg shadow-emerald-600/20 transition hover:bg-emerald-700"
      (click)="onOpenCreateModal()"
    >
      <i class="pi pi-plus text-[11px]" aria-hidden="true"></i>
      Create New Exam
    </button>
  </header>

  <section class="rounded-2xl border border-border/70 bg-card-bg p-4 md:p-5">
    <div class="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <label class="relative block w-full md:max-w-sm">
        <i
          class="pi pi-search pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs text-text-secondary"
        ></i>
        <input
          type="search"
          class="h-10 w-full rounded-xl border border-border bg-surface pl-9 pr-3 text-sm text-text-primary outline-none"
          [value]="searchTerm()"
          (input)="onSearchTermChange($any($event.target).value)"
          placeholder="Search exams..."
        />
      </label>

      <label class="inline-flex items-center gap-2 text-sm text-text-secondary">
        Page Size
        <select
          class="h-10 rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
          [value]="pageSize()"
          (change)="onPageSizeChange($any($event.target).value)"
        >
          @for (size of [5, 10, 20]; track size) {
            <option [value]="size">{{ size }}</option>
          }
        </select>
      </label>
    </div>

    @if (isLoading()) {
      <div class="flex flex-col items-center justify-center py-16 text-center">
        <i class="pi pi-spin pi-spinner text-3xl text-primary" aria-hidden="true"></i>
        <p class="mt-3 text-sm font-semibold uppercase tracking-[0.12em] text-text-secondary">
          Loading exams...
        </p>
      </div>
    } @else if (errorMessage()) {
      <div class="rounded-2xl border border-red-200 bg-red-50 px-5 py-6 text-center text-red-700">
        <i class="pi pi-exclamation-circle text-2xl" aria-hidden="true"></i>
        <p class="mt-2 text-sm font-medium">{{ errorMessage() }}</p>
      </div>
    } @else {
      <app-exams-table
        [exams]="exams()"
        (openBuilder)="onOpenBuilder($event)"
        (publishExam)="onPublishExam($event)"
        (deleteExam)="onDeleteExam($event)"
      ></app-exams-table>

      <footer class="mt-4 flex flex-wrap items-center justify-between gap-2">
        <p class="text-sm text-text-secondary">
          Showing page {{ pageIndex() }} of {{ totalPages() }}
          <span class="ml-1 text-xs">({{ totalSize() }} total exams)</span>
        </p>

        <div class="flex items-center gap-2">
          <button
            type="button"
            class="btn inline-flex h-9 w-9 items-center justify-center rounded-lg border border-border bg-surface text-text-secondary transition hover:bg-surface-container disabled:cursor-not-allowed disabled:opacity-50"
            [disabled]="pageIndex() <= 1"
            (click)="onPreviousPage()"
            aria-label="Previous page"
          >
            <i class="pi pi-chevron-left text-xs" aria-hidden="true"></i>
          </button>

          <button
            type="button"
            class="btn inline-flex h-9 w-9 items-center justify-center rounded-lg border border-border bg-surface text-text-secondary transition hover:bg-surface-container disabled:cursor-not-allowed disabled:opacity-50"
            [disabled]="pageIndex() >= totalPages()"
            (click)="onNextPage()"
            aria-label="Next page"
          >
            <i class="pi pi-chevron-right text-xs" aria-hidden="true"></i>
          </button>
        </div>
      </footer>
    }
  </section>

  <app-create-exam-modal
    [visible]="createModalOpen()"
    [submitting]="creatingExam()"
    [departments]="departments()"
    (closeModal)="onCloseCreateModal()"
    (submitExam)="onCreateExam($event)"
  ></app-create-exam-modal>
</section>
