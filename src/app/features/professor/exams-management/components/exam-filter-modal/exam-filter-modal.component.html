@if (visible) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-[1px]" (click)="close()"></div>

    <section
      class="relative z-10 w-full max-w-md rounded-2xl border border-border/70 bg-card-bg shadow-2xl"
    >
      <header class="flex items-center justify-between border-b border-border/60 px-5 py-4">
        <h2 class="text-base font-bold text-text-primary">Filter Exams</h2>
        <button
          type="button"
          class="btn h-8 w-8 rounded-lg text-text-secondary hover:bg-surface"
          aria-label="Close filter"
          (click)="close()"
        >
          <i class="pi pi-times text-xs"></i>
        </button>
      </header>

      <form [formGroup]="form" class="space-y-4 px-5 py-4">
        <div class="space-y-2">
          <label class="text-[11px] font-bold uppercase tracking-wide text-text-secondary"
            >Sort By</label
          >
          <select
            formControlName="sorting"
            class="h-10 w-full rounded-lg border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none"
          >
            <option value="">All</option>
            @for (option of sortOptions; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        </div>

        <div class="space-y-2">
          <label class="text-[11px] font-bold uppercase tracking-wide text-text-secondary"
            >Academic Level</label
          >
          <div class="flex flex-wrap gap-2">
            @for (level of levelOptions; track level) {
              <button
                type="button"
                class="btn rounded-full px-3 py-1 text-xs font-semibold transition-colors"
                [class.bg-primary]="isLevelActive(level)"
                [class.text-white]="isLevelActive(level)"
                [class.bg-surface-container]="!isLevelActive(level)"
                [class.text-text-secondary]="!isLevelActive(level)"
                (click)="toggleLevel(level)"
              >
                Level {{ level }}
              </button>
            }
          </div>
        </div>

        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
          <div class="space-y-2">
            <label class="text-[11px] font-bold uppercase tracking-wide text-text-secondary"
              >Course ID</label
            >
            <input
              type="number"
              min="1"
              formControlName="courseId"
              class="h-10 w-full rounded-lg border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none"
            />
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold uppercase tracking-wide text-text-secondary"
              >Semester ID</label
            >
            <input
              type="number"
              min="1"
              formControlName="semesterId"
              class="h-10 w-full rounded-lg border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
          <div class="space-y-2">
            <label class="text-[11px] font-bold uppercase tracking-wide text-text-secondary"
              >Department</label
            >
            <select
              formControlName="departmentId"
              class="h-10 w-full rounded-lg border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none"
            >
              <option value="">All departments</option>
              @for (department of departments; track department.courseId) {
                <option [value]="department.courseId">{{ department.courseName }}</option>
              }
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold uppercase tracking-wide text-text-secondary"
              >Exam Status</label
            >
            <select
              formControlName="examStatus"
              class="h-10 w-full rounded-lg border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none"
            >
              <option value="">All statuses</option>
              @for (option of statusOptions; track option.value) {
                <option [value]="option.value">{{ option.label }}</option>
              }
            </select>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-[11px] font-bold uppercase tracking-wide text-text-secondary"
            >Search Title</label
          >
          <input
            type="text"
            formControlName="searchTitle"
            placeholder="Exam title..."
            class="h-10 w-full rounded-lg border border-border/70 bg-surface px-3 text-sm text-text-primary outline-none"
          />
        </div>
      </form>

      <footer class="flex items-center justify-end gap-2 border-t border-border/60 px-5 py-4">
        <button
          type="button"
          class="btn h-9 rounded-lg border border-border/70 bg-surface px-3 text-xs font-semibold text-text-secondary"
          (click)="onReset()"
        >
          Reset
        </button>
        <button
          type="button"
          class="btn h-9 rounded-lg bg-primary px-3.5 text-xs font-semibold text-white"
          (click)="onApply()"
        >
          Show Results
        </button>
      </footer>
    </section>
  </div>
}
