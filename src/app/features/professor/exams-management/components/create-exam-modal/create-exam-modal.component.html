@if (visible()) {
  <div
    class="fixed inset-0 z-350 flex items-center justify-center bg-slate-950/45 p-4 md:p-6"
    (click)="onBackdropClick($event)"
  >
    <section
      class="w-full max-w-3xl overflow-hidden rounded-3xl border border-border bg-card-bg shadow-2xl"
    >
      <header class="border-b border-border bg-primary px-5 py-4 text-white md:px-6">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 class="text-xl font-black tracking-tight md:text-2xl">Create New Exam</h2>
            <p class="text-sm text-white/85">
              Set exam parameters then continue directly to the builder.
            </p>
          </div>

          <button
            type="button"
            class="btn inline-flex h-9 w-9 items-center justify-center rounded-lg text-white/90 transition hover:bg-white/20"
            (click)="onClose()"
            aria-label="Close"
          >
            <i class="pi pi-times text-sm" aria-hidden="true"></i>
          </button>
        </div>
      </header>

      <div class="max-h-[75dvh] overflow-y-auto p-5 md:p-6">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <label class="space-y-1 md:col-span-2">
            <span class="text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Exam Title</span
            >
            <input
              type="text"
              class="h-11 w-full rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
              [ngModel]="title()"
              (ngModelChange)="title.set($event)"
              placeholder="e.g. Midterm Assessment Q1"
            />
          </label>

          <label class="space-y-1">
            <span class="text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Start Time</span
            >
            <input
              type="datetime-local"
              class="h-11 w-full rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
              [ngModel]="startTime()"
              (ngModelChange)="startTime.set($event)"
            />
          </label>

          <label class="space-y-1">
            <span class="text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Duration (Min)</span
            >
            <input
              type="number"
              min="1"
              class="h-11 w-full rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
              [ngModel]="durationMinutes()"
              (ngModelChange)="durationMinutes.set(toNumber($event, 90))"
            />
          </label>

          <label class="space-y-1">
            <span class="text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Passing Score</span
            >
            <input
              type="number"
              min="1"
              max="100"
              class="h-11 w-full rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
              [ngModel]="passingScore()"
              (ngModelChange)="passingScore.set(toNumber($event, 50))"
            />
          </label>

          <label class="space-y-1">
            <span class="text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Total Degree</span
            >
            <input
              type="number"
              min="1"
              class="h-11 w-full rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
              [ngModel]="totalDegree()"
              (ngModelChange)="totalDegree.set(toNumber($event, 100))"
            />
          </label>

          <label class="space-y-1">
            <span class="text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Level</span
            >
            <select
              class="h-11 w-full rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
              [ngModel]="academicLevel()"
              (ngModelChange)="academicLevel.set(toNumber($event, 1))"
            >
              @for (level of [1, 2, 3, 4, 5, 6]; track level) {
                <option [ngValue]="level">Level {{ level }}</option>
              }
            </select>
          </label>

          <label class="space-y-1">
            <span class="text-xs font-bold uppercase tracking-[0.12em] text-text-secondary"
              >Department</span
            >
            <select
              class="h-11 w-full rounded-xl border border-border bg-surface px-3 text-sm text-text-primary outline-none"
              [ngModel]="departmentId()"
              (ngModelChange)="departmentId.set(toNumber($event, 0))"
            >
              <option [ngValue]="0">All departments (general for this level)</option>
              @for (department of departments(); track department.id) {
                <option [ngValue]="department.id">{{ department.name }}</option>
              }
            </select>
            <p class="text-xs text-text-secondary">Selected: {{ selectedDepartmentName() }}</p>
          </label>
        </div>

        <div class="mt-4 space-y-3 rounded-2xl border border-border bg-surface/65 p-3.5">
          <label class="flex items-center justify-between gap-2">
            <div>
              <p class="text-sm font-semibold text-text-primary">Randomize Questions</p>
              <p class="text-xs text-text-secondary">Shuffle question order per student.</p>
            </div>
            <input
              type="checkbox"
              class="h-5 w-5 accent-primary"
              [checked]="isRandomQuestions()"
              (change)="isRandomQuestions.set(!isRandomQuestions())"
            />
          </label>

          <label class="flex items-center justify-between gap-2">
            <div>
              <p class="text-sm font-semibold text-text-primary">Randomize Answers</p>
              <p class="text-xs text-text-secondary">Shuffle MCQ options per student.</p>
            </div>
            <input
              type="checkbox"
              class="h-5 w-5 accent-primary"
              [checked]="isRandomAnswers()"
              (change)="isRandomAnswers.set(!isRandomAnswers())"
            />
          </label>
        </div>
      </div>

      <footer class="flex items-center justify-end gap-2 border-t border-border px-5 py-4 md:px-6">
        <button
          type="button"
          class="btn h-10 rounded-xl border border-border bg-surface px-4 text-sm font-semibold text-text-secondary transition hover:bg-surface-container"
          [disabled]="submitting()"
          (click)="onClose()"
        >
          Cancel
        </button>

        <button
          type="button"
          class="btn h-10 rounded-xl bg-emerald-600 px-4 text-sm font-semibold text-white transition hover:bg-emerald-700 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="!canSubmit()"
          (click)="onSubmit()"
        >
          @if (submitting()) {
            Creating...
          } @else {
            Create & Open Builder
          }
        </button>
      </footer>
    </section>
  </div>
}
