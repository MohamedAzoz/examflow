@if (visible) {
  <div class="fixed inset-0 z-350 flex items-center justify-center p-2 md:p-4">
    <div class="absolute inset-0 bg-slate-900/45 backdrop-blur-[2px]" (click)="close()"></div>

    <section
      class="relative z-400 w-full max-w-4xl overflow-hidden rounded-2xl bg-card-bg shadow-2xl"
    >
      <header class="bg-primary px-6 py-3 text-white md:px-8">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2 class="text-2xl font-black tracking-tight">Initialize New Assessment</h2>
            <p class="text-sm text-white/85">
              Define core parameters and continue to exam builder.
            </p>
          </div>

          <button
            type="button"
            class="btn h-10 w-10 rounded-xl bg-white/15 text-white transition-colors hover:bg-white/25"
            aria-label="Close modal"
            (click)="close()"
          >
            <i class="pi pi-times"></i>
          </button>
        </div>
      </header>

      <form class="space-y-1 p-2 md:p-4" [formGroup]="form" (ngSubmit)="submit()">
        <div class="space-y-2">
          <label for="title" class="text-xs font-bold uppercase tracking-wide text-text-secondary"
            >Exam Title</label
          >
          <input
            id="title"
            type="text"
            formControlName="title"
            placeholder="e.g. Molecular Biology - Semester Final"
            class="h-11 w-full rounded-xl border border-border/70 bg-surface px-3.5 text-sm text-text-primary outline-none transition focus:border-primary/35"
          />
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div class="space-y-2">
            <label
              for="startTime"
              class="text-xs font-bold uppercase tracking-wide text-text-secondary"
              >Start Time</label
            >
            <input
              id="startTime"
              type="datetime-local"
              formControlName="startTime"
              class="h-11 w-full rounded-xl border border-border/70 bg-surface px-3.5 text-sm text-text-primary outline-none transition focus:border-primary/35"
            />
          </div>

          <div class="space-y-2">
            <label
              for="durationMinutes"
              class="text-xs font-bold uppercase tracking-wide text-text-secondary"
              >Duration (Minutes)</label
            >
            <input
              id="durationMinutes"
              type="number"
              min="1"
              formControlName="durationMinutes"
              class="h-11 w-full rounded-xl border border-border/70 bg-surface px-3.5 text-sm text-text-primary outline-none transition focus:border-primary/35"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div class="space-y-2">
            <label
              for="passingScore"
              class="text-xs font-bold uppercase tracking-wide text-text-secondary"
              >Passing Score</label
            >
            <input
              id="passingScore"
              type="number"
              min="1"
              max="100"
              formControlName="passingScore"
              class="h-11 w-full rounded-xl border border-border/70 bg-surface px-3.5 text-sm text-text-primary outline-none transition focus:border-primary/35"
            />
          </div>

          <div class="space-y-2">
            <label
              for="totalDegree"
              class="text-xs font-bold uppercase tracking-wide text-text-secondary"
              >Total Degree</label
            >
            <input
              id="totalDegree"
              type="number"
              min="1"
              formControlName="totalDegree"
              class="h-11 w-full rounded-xl border border-border/70 bg-surface px-3.5 text-sm text-text-primary outline-none transition focus:border-primary/35"
            />
          </div>
        </div>
          <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div class="space-y-2">
              <label
                for="academicLevel"
                class="text-xs font-bold uppercase tracking-wide text-text-secondary"
                >Level</label
              >
              <select
                id="academicLevel"
                formControlName="academicLevel"
                class="h-11 w-full rounded-xl border border-border/70 bg-surface px-3.5 text-sm text-text-primary outline-none transition focus:border-primary/35"
              >
                <option [value]="1">Level 1</option>
                <option [value]="2">Level 2</option>
                <option [value]="3">Level 3</option>
                <option [value]="4">Level 4</option>
              </select>
            </div>

            <div class="space-y-2">
              <label
                for="departmentsIds"
                class="text-xs font-bold uppercase tracking-wide text-text-secondary"
                >Departments</label
              >
              <select
                id="departmentsIds"
                multiple
                formControlName="departmentsIds"
                class="min-h-24 w-full rounded-xl border border-border/70 bg-surface px-3.5 py-2 text-sm text-text-primary outline-none transition focus:border-primary/35"
              >
                @for (department of departments; track department.id) {
                  <option [value]="department.id">{{ department.name }}</option>
                }
              </select>
            </div>
          </div>
        <section class="space-y-2 rounded-2xl border border-border/65 bg-surface/55 p-4">
          <label class="flex items-center justify-between gap-3">
            <div>
              <p class="text-sm font-bold text-text-primary">Randomize Questions</p>
              <p class="text-xs text-text-secondary">
                Shuffle question order for each student session.
              </p>
            </div>
            <input
              type="checkbox"
              formControlName="isRandomQuestions"
              class="h-4 w-4 accent-primary"
            />
          </label>

          <label class="flex items-center justify-between gap-3">
            <div>
              <p class="text-sm font-bold text-text-primary">Randomize Answers</p>
              <p class="text-xs text-text-secondary">
                Shuffle multiple choice options per student.
              </p>
            </div>
            <input
              type="checkbox"
              formControlName="isRandomAnswers"
              class="h-4 w-4 accent-primary"
            />
          </label>
        </section>

        <div class="grid grid-cols-1 gap-3 pt-2 md:grid-cols-2">
          <button
            type="button"
            class="h-11 btn rounded-xl border border-border/80 bg-surface font-semibold text-text-secondary transition-colors hover:bg-surface-container"
            (click)="close()"
          >
            Save as Draft
          </button>

          <button
            type="submit"
            class="btn h-11 rounded-xl bg-primary font-semibold text-white shadow-lg shadow-primary/25 transition hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-60"
            [disabled]="form.invalid"
          >
            Proceed to Builder
          </button>
        </div>
      </form>
    </section>
  </div>
}
