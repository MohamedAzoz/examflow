<div class="flex flex-col h-dvh">
  <app-exam-header [countdown]="countdown()" [studentId]="currentExam()?.studentExamId || ''">
  </app-exam-header>

  <main
    class="grid w-full flex-1 items-start gap-3 px-3 py-4 lg:grid-cols-[minmax(0,1fr)_minmax(0,320px)] lg:gap-5 lg:px-6 lg:py-5"
  >
    @if (currentQuestion(); as q) {
      <app-question-area
        class="h-full"
        [title]="q.text"
        [imageUrl]="currentQuestionImage()"
        [questType]="q.questionType"
        [options]="q.options"
        [selectedOptionId]="selectedOptions()[q.questionId] || 0"
        [essayValue]="essayAnswers()[q.questionId] || ''"
        [isMarked]="markedQuestions()[q.questionId] || false"
        [isDirty]="isDirty()"
        [navigationBlocked]="showNavigationWarning()"
        [isSavingEssay]="isSavingEssay()"
        [isFirst]="questionIndex() === 0"
        [isLast]="questionIndex() >= questions().length - 1"
        (optionSelected)="selectOption($event)"
        (essayAnswer)="essayAnswer($event, q.questionId)"
        (saveEssay)="saveEssayAnswer()"
        (toggleMark)="toggleMark()"
        (previous)="previous()"
        (next)="next()"
      >
      </app-question-area>
    } @else {
      <div
        class="flex items-center justify-center rounded-xl border border-border bg-card-bg p-5 text-base font-medium text-text-secondary shadow-sm"
      >
        <p>Loading question data...</p>
      </div>
    }

    <app-question-map
      class="h-full min-h-65 lg:min-h-95"
      [questionIds]="questionIds()"
      [currentIndex]="questionIndex()"
      [answeredIds]="allAnsweredIds()"
      [markedIds]="markedQuestions()"
      [availableTimeToStart]="availableTimeToStart()"
      [errorMessage]="errorMessage()"
      (jumpTo)="jumpTo($event)"
      (submit)="submit()"
    >
    </app-question-map>
  </main>
</div>
