<article
  class="flex h-full min-h-75 w-full min-w-75 flex-col rounded-2xl border border-border bg-card-bg shadow-sm p-3 md:p-6"
>
  <div class="flex items-start mb-3 md:mb-6">
    <h2
      class="w-full max-w-[92%] mx-auto font-black leading-snug text-text-dark text-lg md:text-xl lg:text-2xl xl:text-3xl"
      [dir]="textDirection(title())"
    >
      {{ title() }}
    </h2>
  </div>

  @if (questType() === essay) {
    @if (imageUrl() !== '' && imageUrl() !== undefined) {
      <div class="mb-2 flex items-center justify-center">
        <img
          class="h-auto w-full max-w-full rounded-lg border border-border object-contain md:max-w-[80%]"
          [src]="imageUrl()"
          alt="Question image"
        />
      </div>
    }

    <div
      class="mt-2.5 flex flex-1 flex-col rounded-lg border border-border bg-main-bg p-2.5 md:p-3.5"
    >
      <textarea
        name="answer"
        id="answer"
        rows="5"
        class="min-h-44 w-full flex-1 resize-none rounded-md border border-border bg-card-bg p-1.5 text-sm text-text-dark outline-none transition focus:border-primary focus:ring-2 focus:ring-primary-light md:text-base"
        [dir]="textDirection(essayValue())"
        placeholder="Write your answer here"
        [value]="essayValue()"
        (input)="essayAnswer.emit($any($event.target).value)"
      ></textarea>
    </div>

    @if (navigationBlocked()) {
      <div
        class="mt-3 rounded-md border border-amber-300 bg-amber-50 px-3 py-2 text-sm font-medium text-amber-700"
        role="alert"
        title="Please save your essay answer before navigating"
      >
        Please save your answer before moving to another question.
      </div>
    }

    <button
      type="button"
      class="mt-3 btn w-full rounded-lg border border-transparent bg-primary px-4 py-2.5 text-base font-semibold text-white transition hover:bg-primary-hover disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="!isDirty() || isSavingEssay()"
      (click)="saveEssay.emit()"
    >
      {{ isSavingEssay() ? 'Saving...' : 'Save Answer' }}
    </button>
  } @else {
    <div class="mx-auto flex w-full max-w-[90%] md:max-w-[94%] flex-1 flex-col gap-3 md:gap-4.5">
      @for (option of options(); track option.optionId) {
        <label [class]="optionClass(option.optionId)">
          <input
            type="radio"
            name="questionOption"
            class="sr-only"
            [value]="option.optionId"
            [checked]="selectedOptionId() === option.optionId"
            (change)="optionSelected.emit(option.optionId)"
          />
          <span [class]="optionRadioClass(option.optionId)">
            <span [class]="optionRadioDotClass(option.optionId)"></span>
          </span>
          <span
            class="flex-1 text-base leading-relaxed md:text-xl"
            [dir]="textDirection(option.optionText)"
          >
            {{ option.optionText }}
          </span>
        </label>
      }
    </div>
  }

  <div
    class="mt-3 lg:mt-6 w-full max-w-[90%] lg:max-w-[94%] mx-auto flex flex-wrap items-center justify-between gap-3"
  >
    <button type="button" [class]="navButtonClass" (click)="previous.emit()" [disabled]="isFirst()">
      Previous
    </button>

    <button
      type="button"
      [class]="markButtonClass()"
      (click)="toggleMark.emit()"
      title="Mark Question"
      aria-label="Mark question"
    >
      <i class="pi pi-flag-fill text-sm md:text-base"></i>
    </button>

    <button type="button" [class]="navButtonClass" (click)="next.emit()" [disabled]="isLast()">
      Next
    </button>
  </div>
</article>
