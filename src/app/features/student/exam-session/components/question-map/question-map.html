<aside
  class="flex w-full flex-col rounded-2xl border border-border bg-card-bg p-3 shadow-sm md:p-4"
>
  <div class="grid flex-1 grid-cols-5 gap-2.5 md:gap-3 lg:grid-cols-4">
    @for (qId of questionIds(); track qId) {
      <button
        type="button"
        [class]="questionButtonClass(qId, $index)"
        (click)="jumpTo.emit($index)"
        [attr.aria-label]="'Question ' + ($index + 1)"
      >
        <span [class]="questionNumberClass($index)">{{ $index + 1 }}</span>
        @if (markedIds()[qId]) {
          <i class="pi pi-flag-fill absolute right-1 top-1 text-[0.6rem] text-danger"></i>
        }
      </button>
    }
  </div>

  <button
    type="button"
    [class]="submitButtonClass()"
    (click)="submit.emit()"
    [disabled]="isDisabled()"
  >
    Submit Exam
  </button>

  @if (errorMessage()) {
    <div class="mt-4 text-center text-sm font-semibold text-danger">
      {{ errorMessage() }}
    </div>
  }
</aside>
