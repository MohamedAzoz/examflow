<aside class="flex flex-col rounded-xl w-full border border-border bg-card-bg **:text-text-dark p-3 shadow-sm md:p-4">
  <div class="grid flex-1 grid-cols-4 gap-2 md:gap-2.5">
    @for (qId of questionIds(); track $index) {
      <button
        type="button"
        [class]="questionButtonClass(qId, $index)"
        (click)="jumpTo.emit($index)"
        [attr.aria-label]="'Question ' + ($index + 1)"
      >
        <span [class]="questionNumberClass($index)">{{ $index + 1 }}</span>
        @if (markedIds()[qId]) {
          <i class="pi pi-flag-fill absolute right-1 top-1 text-[0.6rem] text-danger"></i>
        }
      </button>
    }
  </div>

  <button
    type="button"
    [class]="[isDisabled() ? 'cursor-not-allowed opacity-40' : 'cursor-pointer opacity-100']"
    class="mt-5 w-full rounded-lg bg-danger px-4 py-2.5 text-lg font-semibold text-white transition hover:brightness-95 md:mt-6 md:text-xl"
    (click)="submit.emit()"
    [disabled]="isDisabled()"
  >
    Submit Exam
  </button>

  @if (errorMessage()) {
    <div class="mt-4 text-center text-sm font-semibold text-danger">
      {{ errorMessage() }}
    </div>
  }
</aside>
