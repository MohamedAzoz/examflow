<article
  class="grid gap-3 rounded-2xl border p-3.5 md:p-4 bg-white/90 dark:bg-slate-900/35"
  [style.border-color]="
    question.answerStatus ? 'rgba(41, 158, 91, 0.34)' : 'rgba(188, 62, 62, 0.28)'
  "
>
  <header class="flex items-start justify-between gap-2">
    <div class="min-w-0">
      <p class="m-0 text-[0.65rem] uppercase tracking-[0.18em] text-text-secondary font-black">
        Question {{ index }}
      </p>
      <h3
        class="m-0 mt-1 text-[clamp(1rem,1.9vw,1.12rem)] leading-tight font-black text-text-primary"
      >
        {{ question.answerStatus ? 'Correct Answer' : 'Incorrect Answer' }}
      </h3>
    </div>
    <span
      class="shrink-0 inline-flex items-center justify-center rounded-full border border-border-teal/30 bg-border-teal/15 px-2.5 py-1 text-[0.68rem] font-black text-primary"
    >
      {{ question.degree }} pts
    </span>
  </header>

  <p
    class="m-0 text-[clamp(0.96rem,1.7vw,1.05rem)] leading-[1.6] font-semibold text-text-primary wrap-break-word"
    dir="auto"
  >
    {{ question.questionText }}
  </p>

  @if (imageUrl !== null && !imageError) {
    <div
      class="rounded-xl overflow-hidden border border-border-teal/25 bg-surface/45 dark:bg-slate-950/35"
    >
      <img
        [src]="imageUrl"
        (error)="imageError = true"
        [alt]="'Question ' + index + ' illustration'"
        class="block w-full max-h-56 object-cover"
      />
    </div>
  }

  <div class="grid gap-2.5">
    <div
      class="rounded-xl border px-3 py-2.5"
      [class]="
        question.answerStatus
          ? 'border-success/80 bg-primary-hover/25 '
          : 'border-danger/80 bg-danger/25'
      "
    >
      <span
        class="block text-[0.64rem] uppercase tracking-[0.14em] text-text-secondary font-black mb-1"
        >Your answer</span
      >
      <p
        class="m-0 text-[clamp(0.9rem,1.7vw,1rem)] leading-[1.55] font-bold text-text-primary wrap-break-word"
        dir="auto"
      >
        {{ studentAnswerText }}
      </p>
    </div>

    <!-- @if (shouldShowCorrectAnswer) { -->
    <div class="rounded-xl border px-3 py-2.5 border-success/80 bg-primary-hover/25">
      <span
        class="block text-[0.64rem] uppercase tracking-[0.14em] text-text-secondary font-black mb-1"
        >Correct answer</span
      >
      <p
        class="m-0 text-[clamp(0.9rem,1.7vw,1rem)] leading-[1.55] font-bold text-text-primary wrap-break-word"
        dir="auto"
      >
        {{ correctAnswerText }}
      </p>
    </div>
    <!-- } -->
  </div>
</article>
