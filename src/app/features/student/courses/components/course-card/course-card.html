<div 
  class="bg-card-bg w-full rounded-lg p-4 py-10 shadow-sm border h-full flex flex-col justify-between transition-all hover:shadow-md"
  [ngClass]="{
    'border-red-100 shadow-red-50': course().isRetake,
    'border-slate-100': !course().isRetake
  }"
>
  <div class="flex justify-between items-start mb-4">
    <div>
      @if (course().isRetake) {
        <span class="bg-red-50 text-red-500 text-xs font-bold px-2 py-0.5 rounded-full uppercase tracking-wider border border-red-100">
          Retake
        </span>
      }
    </div>
    <span class="bg-slate-50 text-text-secondary text-xs font-bold px-2 py-0.5 rounded-full border border-slate-100">
      Level {{ course().academicLevel }}
    </span>
  </div>

  <div class="mt-auto">
    <h3 class="text-text-primary font-bold text-lg leading-tight mb-1">
      {{ course().name }}
    </h3>
    <p class="text-text-secondary text-xs font-medium uppercase tracking-tight">
      {{ course().code }}
    </p>
  </div>
</div>
