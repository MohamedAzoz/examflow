@if (activeExam(); as exam) {
  <section
    class="relative h-full min-h-[250px] sm:min-h-[300px] overflow-hidden rounded-4xl sm:rounded-[2.5rem] p-6 sm:p-10 flex flex-col justify-between group transition-all duration-500 shadow-2xl shadow-primary/20 border border-white/10"
    style="background: linear-gradient(135deg, #13626c 0%, #2a8f9c 100%)"
  >
    <!-- Background Lens Flare / Glow -->
    <div class="absolute -right-20 -bottom-20 w-80 h-80 bg-white/10 rounded-full blur-[100px] group-hover:bg-white/20 transition-all duration-1000"></div>
    <div class="absolute -left-20 -top-20 w-60 h-60 bg-white/5 rounded-full blur-[80px]"></div>

    <!-- Header Section -->
    <div class="relative space-y-3 sm:space-y-4">
      <div class="flex flex-wrap items-center gap-2 sm:gap-4">
        <span class="inline-flex items-center px-3 sm:px-4 py-1 sm:py-1.5 rounded-full bg-white/20 backdrop-blur-md border border-white/20 text-white text-[9px] sm:text-[10px] font-black uppercase tracking-[0.2em]">
          Active Exam
        </span>
        <span class="text-white/60 text-[10px] sm:text-xs font-bold truncate max-w-[150px]">{{ exam.courseName }}</span>
      </div>

      <div class="space-y-1">
        <h2 class="text-2xl sm:text-4xl md:text-5xl font-black text-white tracking-tight leading-tight drop-shadow-sm">
          {{ exam.title }}
        </h2>
      </div>
    </div>

    <!-- Footer Section: Timer & Action -->
    <div class="relative flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 sm:gap-8 mt-8 sm:mt-12">
      <div class="space-y-1 sm:space-y-2">
        <span class="block text-[9px] sm:text-[10px] font-black text-white/50 uppercase tracking-[0.2em]">Time Remaining</span>
        <div class="flex items-baseline gap-2">
          <strong class="text-4xl sm:text-6xl md:text-7xl font-black text-white tabular-nums tracking-tighter drop-shadow-lg leading-none">
            {{ countdown() }}
          </strong>
        </div>
      </div>

      <button
        type="button"
        class="group/btn relative w-full sm:w-auto px-6 sm:px-10 py-4 sm:py-5 bg-white text-primary font-black text-base sm:text-lg rounded-2xl sm:rounded-3xl transition-all duration-300 hover:scale-105 active:scale-95 shadow-2xl shadow-black/10 flex items-center justify-center gap-3 overflow-hidden disabled:opacity-50 disabled:scale-100"
        (click)="joinExam(exam.examId)"
        [disabled]="IsAvailableToStart()"
      >
        <span>JOIN EXAM</span>
        <i class="pi pi-arrow-right text-sm transition-transform group-hover/btn:translate-x-1"></i>
      </button>
    </div>
  </section>
} @else {
  <section
    class="h-full min-h-[300px] flex flex-col items-center justify-center gap-6 bg-surface/30 border-2 border-dashed border-border/40 rounded-[2.5rem] text-center p-12 transition-all hover:bg-surface/40"
  >
    <div class="w-20 h-20 rounded-full bg-surface-container flex items-center justify-center shadow-inner">
      <i class="pi pi-clock text-4xl text-text-secondary/20"></i>
    </div>
    <div class="space-y-3">
      <h3 class="text-2xl font-black text-text-primary/30 uppercase tracking-widest">No active sessions</h3>
      <p class="text-text-secondary/40 text-sm font-medium max-w-[280px]">Active exams will appear here automatically when they start.</p>
    </div>
  </section>
}
