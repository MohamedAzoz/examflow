<div class="card card-outline">
  <h3 class="card-title">Past Exams</h3>
  <div class="card-body">
    @if(exams().length > 0) {
      <ul class="exam-list">
        @for(exam of exams(); track exam.id || $index) {
          <li class="exam-item">
            <i class="bi bi-check-circle item-icon"></i>
            <span class="item-text">{{ exam.title }} - Grade: {{ exam.grade }}</span>
          </li>
        }
      </ul>
    } @else {
      <!-- Mock Data shown in screenshot -->
      <ul class="exam-list">
        <li class="exam-item">
          <i class="bi bi-check-circle item-icon"></i>
          <span class="item-text">Physics 101 - Grade: 90% (A)</span>
        </li>
        <li class="exam-item">
          <i class="bi bi-check-circle item-icon"></i>
          <span class="item-text">Electronic 301 - Grade: 90% (A+)</span>
        </li>
      </ul>
    }
  </div>
</div>
