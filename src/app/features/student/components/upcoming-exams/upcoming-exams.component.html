<div class="card card-outline">
  <h3 class="card-title">Upcoming Exams</h3>
  <div class="card-body">
    @if(exams().length > 0) {
      <ul class="exam-list">
        @for(exam of exams(); track exam.id || $index) {
          <li class="exam-item">
            <i class="bi bi-clock item-icon"></i>
            <span class="item-text">{{ exam.title }} - {{ exam.time || 'Scheduled soon' }}</span>
          </li>
        }
      </ul>
    } @else {
      <!-- Mock Data based on the UI screenshot when no real data is passed, or just show the mock items -->
      <ul class="exam-list">
        <li class="exam-item">
          <i class="bi bi-clock item-icon"></i>
          <span class="item-text">Cs101 - Tomorrow 10:00 AM</span>
        </li>
        <li class="exam-item">
          <i class="bi bi-calendar3 item-icon"></i>
          <span class="item-text">OSA202 - Next week</span>
        </li>
      </ul>
    }
  </div>
</div>
