<div class="card card-outline">
  <h3 class="card-title">Active Exams</h3>
  <div class="card-body">
    @if(exams().length > 0) {
      <div class="active-list">
        @for(exam of exams(); track exam.id || $index) {
          <button class="join-exam-btn" (click)="onJoinExam(exam.id)">
            <span class="join-label">JOIN EXAM: {{ exam.title }} (Ending soon!)</span>
            <span class="timer">00:30:00</span>
          </button>
        }
      </div>
    } @else {
      <!-- Mock Data -->
      <div class="active-list">
        <button class="join-exam-btn" (click)="onJoinExam(1)">
          <span class="join-label">JOIN EXAM: Math 202 (Ending soon!)</span>
          <span class="timer">00:30:00</span>
        </button>
      </div>
    }
  </div>
</div>
