<div class="card exam-card">
  <div class="card-body">
    <h5 class="card-title">Active Exams</h5>
    @if (activeExam(); as exam) {
      <button
        class="active-exam-badge"
        (click)="joinExam(exam.examId)"
        [disabled]="IsAvailableToStart"
      >
        <span class="exam-label">JOIN EXAM: {{ exam.courseName }} (Ending soon!)</span>
        <span class="countdown">{{ countdown() }}</span>
      </button>
    } @else {
      <p class="empty-text">No active exams</p>
    }
  </div>
</div>
