<div class="exam-session-layout">
  <!-- Top Bar Component -->
  <app-exam-header
   [countdown]="countdown()" [studentId]="currentExam()?.studentExamId || ''">
  </app-exam-header>

  <!-- Main Content Grid -->
  <main class="exam-content-grid">
    @if (currentQuestion(); as q) {
      <app-question-area
        [title]="q.text"
        [imageUrl]="currentQuestionImage()"
        [questType]="q.questionType"
        [options]="q.options"
        [selectedOptionId]="selectedOptions()[q.questionId] || 0"
        [essayValue]="essayAnswers()[q.questionId] || ''" 
        [isMarked]="markedQuestions()[q.questionId] || false"
        [isFirst]="questionIndex() === 0"
        [isLast]="questionIndex() >= questions().length - 1"
        (optionSelected)="selectOption($event)"
        (essayAnswer)="essayAnswer($event, q.questionId)"
        (toggleMark)="toggleMark()"
        (previous)="previous()" 
        (next)="next()"
      > 
      </app-question-area>
    } @else { 
      <div class="loading-state">
        <p class="text-muted">Loading question data...</p>
      </div>
    }

    <!-- Right Side Map Component -->
    <app-question-map
      [questionIds]="questionIds()"
      [currentIndex]="questionIndex()"
      [answeredIds]="allAnsweredIds()"
      [markedIds]="markedQuestions()"
      [availableTimeToStart]="availableTimeToStart()"
      [errorMessage]="errorMessage()"
      (jumpTo)="jumpTo($event)"
      (submit)="submit()"
    >
    </app-question-map>
  </main>

  <!-- Offline Status Indicator -->
  <!-- @if (!isOnline()) {
    <div class="offline-sync-badge">
      <i class="bi bi-cloud-slash-fill"></i>
      <span>Working Offline - Progress Saved Locally</span>
    </div>
  } -->
</div>
