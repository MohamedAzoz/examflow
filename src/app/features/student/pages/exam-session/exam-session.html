<div class="exam-session-layout">
  <!-- Top Bar Component -->
  <app-exam-header 
    [countdown]="countdown()"
    [studentId]="currentExam()?.studentExamId || ''">
  </app-exam-header>

  <!-- Main Content Grid -->
  <main class="exam-content-grid">
    @if (currentQuestion()) {
      <app-question-area
        [title]="currentQuestion().text"
        [imageUrl]="currentQuestionImage()"
        [options]="currentQuestion().options"
        [selectedOptionId]="selectedOptions()[currentQuestion().questionId] || null"
        [isMarked]="markedQuestions()[currentQuestion().questionId] || false"
        [isFirst]="questionIndex() === 0"
        [isLast]="questionIndex() >= questions().length - 1"
        (optionSelected)="selectOption($event)"
        (toggleMark)="toggleMark()" 
        (previous)="previous()"
        (next)="next()">
      </app-question-area>
    } @else {
      <div class="loading-state">
        <p class="text-muted">Loading question data...</p>
      </div>
    }

    <!-- Right Side Map Component -->
    <app-question-map
      [questionIds]="questionIds()"
      [currentIndex]="questionIndex()"
      [answeredIds]="selectedOptions()"
      [markedIds]="markedQuestions()"
      [isLoading]="isLoading()"
      [errorMessage]="errorMessage()"
      (jumpTo)="jumpTo($event)"
      (submit)="submit()">
    </app-question-map>
  </main>
</div>
