<div class="min-h-screen flex items-center justify-center bg-[#EFEFEF] py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-md w-full bg-white rounded-xl shadow-sm p-8 space-y-8">
    
    <!-- Header: Logo & Name -->
    <div class="flex items-center justify-center gap-3">
      <img ngSrc="Logo.svg" width="32" height="32" priority class="h-8 w-8" alt="ExamFlow" />
      <span class="text-xl font-medium tracking-widest text-[#152C36] uppercase">EXAMFLOW</span>
    </div>

    <!-- Icon & Titles -->
    <div class="flex flex-col items-center justify-center text-center mt-6">
      <h2 class="text-[#30787C] text-2xl font-bold mb-3">Verify Your Email</h2>
      <p class="text-sm text-slate-500 px-4">
        We've sent a secure OTP code to your email. Please enter it below.
      </p>
    </div>

    <!-- Feedback -->
    @if (authFacade.errorMessage()) {
      <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700" role="alert">
        {{ authFacade.errorMessage() }}
      </div>
    }

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
      
      <!-- Readonly Email Field -->
      <div>
        <label for="email_display" class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-2">Code Sent To:</label>
        <p-iconfield>
          <p-inputicon class="pi pi-envelope text-slate-400" />
          <input
            id="email_display"
            type="email"
            pInputText
            [value]="email()"
            readonly
            class="w-full rounded-xl border-none bg-slate-50 py-3 text-sm text-slate-500 opacity-80 cursor-not-allowed outline-none"
          />
        </p-iconfield>
      </div>

      <!-- OTP Input -->
      <div>
        <input
          id="code"
          type="text"
          pInputText
          formControlName="code"
          placeholder="••••••"
          autocomplete="one-time-code"
          maxlength="6"
          class="w-full rounded-xl border-none bg-[#EBF5F5] py-4 text-center text-2xl tracking-[1em] text-[#30787C] font-mono focus:ring-2 focus:ring-[#30787C] outline-none transition"
          [class.ring-1]="form.controls.code.touched && form.controls.code.invalid"
          [class.ring-red-400]="form.controls.code.touched && form.controls.code.invalid"
        />
        @if (form.controls.code.touched && form.controls.code.invalid) {
          <p class="mt-2 text-xs text-red-500 text-center">Please enter a valid OTP code.</p>
        }
      </div>

      <!-- Action Button -->
      <button
        type="submit"
        pButton
        [loading]="authFacade.isLoading()"
        [disabled]="authFacade.isLoading()"
        class="w-full flex justify-center items-center rounded-xl border-none bg-[#30787C] py-3.5 text-sm font-semibold text-white transition hover:bg-[#28666A]"
      >
        {{ authFacade.isLoading() ? 'Verifying...' : 'Verify Code' }}
      </button>

    </form>

    <!-- Footer Link -->
    <div class="mt-6 text-center text-sm">
      <span class="text-slate-500">Didn't receive the code?</span>
      <button
        type="button"
        class="ml-1 font-semibold text-[#30787C] transition hover:text-[#28666A]"
      >
        Resend OTP
      </button>
    </div>

  </div>
</div>
