<div class="w-full max-w-3xl mx-auto p-4 md:p-6 lg:p-8">
  <div class="bg-white rounded-2xl border border-black/10 p-6 md:p-8 shadow-sm">
    <div class="mb-6">
      <h2 class="text-xl md:text-2xl font-bold text-text-dark m-0 mb-1">Reset User Password</h2>
      <p class="text-sm text-text-secondary m-0">
        Search for a student or professor to securely reset their credentials.
      </p>
    </div>

    @if (!selectedUser()) {
      <app-user-search />
    } @else {
      <app-reset-form />
    }
  </div>
</div>
