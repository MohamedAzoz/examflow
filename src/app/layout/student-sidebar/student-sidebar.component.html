<aside class="sidebar" [class.is-toggled]="toggle.value()" role="complementary" aria-label="Sidebar navigation">
  <!-- Profile Section -->
  <div class="user-profile">
    <div class="user-avatar-container">
      <div class="user-avatar">
        <i class="bi bi-person-fill"></i>
      </div>
    </div>
    <div class="user-info text-center">
      <p class="user-welcome">Welcome back,</p>
      <p class="user-name">{{ userName() }}</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
    <ul class="nav-list">
      @for (item of navItems; track item.route) {
        <li class="nav-item">
          <button type="button" class="nav-link" (click)="onNavClick(item.route)" [class.active]="activeRoute() === item.route" [attr.aria-current]="activeRoute() === item.route ? 'page' : null">
            <i class="bi {{ item.icon }} nav-icon"></i>
            <span class="nav-label">{{ item.label }}</span>
          </button>
        </li>
      }
    </ul>
  </nav>
</aside>
