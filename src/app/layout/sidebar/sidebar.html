<aside
  class="sidebar fixed left-0 top-0 z-400 flex h-dvh w-65 flex-col overflow-auto overflow-y-hidden border-r border-border bg-sidebar-bg shadow-sm"
  [class.-translate-x-full]="!toggle.value() && isMobile()"
  [class.translate-x-0]="toggle.value() || !isMobile()"
  [class.hidden]="toggle.isExamMode() && (!isMobile() || !toggle.value())"
  role="complementary"
  aria-label="Sidebar navigation"
>

  <!-- Hamburger/Close (Mobile Toggle) -->
  @if (isStudent() && isMobile()) {
    <div class="flex justify-start px-4 pt-2">
      <button
        type="button"
        class="bg-transparent border-none text-primary cursor-pointer p-1 rounded-md hover:bg-[#13626c10]"
        (click)="onCloseClick()"
      >
        <i class="pi pi-bars icon-small"></i>
      </button>
    </div>
  }
  @if (!isStudent()) {
    <div class="flex justify-start px-4 pt-3 mb-2">
      <button
        type="button"
        class="bg-transparent border-none text-primary cursor-pointer p-1 rounded-md hover:bg-[#13626c10]"
        (click)="onCloseClick()"
      >
        <i class="pi pi-bars text-2xl font-bold"></i>
      </button>
    </div>
    <!-- Brand -->
    <div class="px-4 pb-2 mb-1">
      <span class="text-xl font-extrabold text-primary tracking-wider uppercase select-none"
        >EXAMFLOW</span
      >
    </div>
  }

  <!-- User Profile Section -->
  @if (isStudent()) {
    <div class="flex flex-col items-center justify-center px-4 lg:py-8 py-2 lg:mb-2 mb-0">
      <!-- Big Avatar -->
      <div class="p-1 border border-black rounded-full mb-4">
        <div
          class="w-16 lg:w-24 h-16 lg:h-24 rounded-full text-white bg-text-secondary shadow-sm flex items-center justify-center transition-transform hover:scale-105"
        >
          <i class="pi pi-user icon"></i>
        </div>
      </div>
      <!-- Welcome Message -->
      <span class="text-sm font-medium text-primary mb-1 select-none">Welcome back</span>
      <!-- User Name -->
      <h3
        class="mb-2 lg:m-0 text-md lg:text-lg font-bold text-text-primary text-center px-2 leading-snug"
      >
        {{ userName() }}
      </h3>
    </div>
  } @else {
    <div
      class="flex items-center gap-3 px-2 py-2 mx-3 mb-1 bg-white/50 rounded-2xl border border-white"
    >
      <div
        class="w-14 h-14 shrink-0 rounded-full bg-primary-light text-primary flex items-center justify-center text-2xl shadow-sm"
      >
        <i class="pi pi-user"></i>
      </div>
      <div class="flex flex-col overflow-hidden">
        <p class="m-0 text-sm font-bold text-text-primary truncate leading-tight">
          {{ userName() }}
        </p>
        <p class="m-0 text-xs font-medium text-text-secondary truncate mt-0.5">{{ userRole() }}</p>
      </div>
    </div>
  }

  <!-- Navigation -->
  <nav class="flex-1 min-h-0 overflow-y-auto px-3 py-1" role="navigation">
    <ul class="list-none flex flex-col" [ngClass]="[isStudent() ? 'gap-2' : 'gap-0']">
      @for (item of navItems(); track $index) {
        <li class="w-full">
          <a
            [routerLink]="[url(item.route)]"
            (click)="onNavClick(item.route)"
            class="group flex items-center gap-3 w-full px-3 rounded-lg no-underline transition-all duration-200 text-text-secondary font-semibold hover:bg-primary-light hover:text-primary"
            [ngClass]="isStudent() ? 'py-3.5 text-sm lg:text-base' : 'py-2 text-xs lg:text-sm'"
            routerLinkActive="bg-link text-white active-item shadow-md"
            [attr.aria-current]="activeRoute() === item.route ? 'page' : null"
          >
            <!-- Nav Icon -->
            <div class="w-6 h-6 flex items-center justify-center shrink-0">
              <i class="pi {{ item.icon }} text-lg group-[.active-item]:text-white"></i>
            </div>
            <span class="truncate group-[.active-item]:text-white">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Logout Footer -->
  <div class="mt-auto shrink-0 border-t border-black/10 p-3 bg-sidebar-bg">
    <button
      type="button"
      (click)="onLogout()"
      class="flex items-center justify-center gap-3 w-full px-1 py-3 rounded-lg bg-main-bg border border-danger/40 text-danger text-sm font-bold cursor-pointer no-underline transition-all duration-200 hover:bg-white-red hover:border-danger/80 hover:shadow-sm"
    >
      <i class="pi pi-sign-out text-lg"></i>
      <span>Logout</span>
    </button>
  </div>
</aside>
