<div class="app-shell">

  <!-- Overlay (mobile only, when sidebar is open) -->
  @if (toggle.value() && isMobile()) {
    <div
      class="sidebar-overlay"
      (click)="onOverlayClick()"
      aria-hidden="true">
    </div>
  }

  <!-- Sidebar -->
  <app-sidebar
    [navItems]="navItems()"
    [userName]="userName()"
    [userRole]="userRoleLabel()"
    [activeRoute]="activeRoute()"
    [isMobile]="isMobile()"
    (navItemSelected)="onNavItemSelected($event)" />

  <!-- Main Area -->
  <div
    class="main-area"
    [class.sidebar-expanded]="!isMobile() && toggle.value()"
    [class.sidebar-always-visible]="!isMobile()">

    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button
          type="button"
          class="hamburger-btn"
          (click)="toggle.toggle()"
          [attr.aria-expanded]="toggle.value()"
          aria-label="Toggle sidebar">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="page-title">{{ pageTitle() }}</h1>
      </div>

      @if (showNotifications()) {
        <div class="header-right">
          <button
            type="button"
            class="btn-icon"
            aria-label="Notifications">
            <i class="bi bi-bell"></i>
            <span class="notif-dot"></span>
          </button>
        </div>
      }
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet />
    </main>
  </div>

</div>
