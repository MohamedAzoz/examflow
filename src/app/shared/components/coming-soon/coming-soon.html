<section class="min-h-[calc(100dvh-8rem)] w-full px-4 py-8 md:px-8 md:py-12">
  <div
    class="mx-auto flex w-full max-w-3xl flex-col items-center rounded-3xl border border-border bg-card-bg px-6 py-10 text-center shadow-sm md:px-10 md:py-14"
  >
    <div
      class="mb-5 inline-flex h-24 w-24 items-center justify-center rounded-full border border-primary-light bg-surface"
    >
      <i class="pi pi-cog text-5xl text-primary opacity-90"></i>
    </div>

    <h1 class="mb-3 text-3xl font-bold text-text-dark md:text-4xl">
      {{ pageTitle() }}
    </h1>

    <p class="mb-8 text-lg text-text-secondary md:text-xl">
      {{ message() }}
    </p>

    <button
      pButton
      type="button"
      label="Back"
      icon="pi pi-arrow-left"
      severity="secondary"
      class="p-button-outlined px-6"
      (click)="goBack()"
    ></button>
  </div>
</section>
