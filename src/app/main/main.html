<div class="relative min-h-dvh">
  <!-- Overlay: mobile only, when sidebar open -->
  @if (toggle.value() && isMobile() && !toggle.isExamMode()) {
    <div
      class="fixed inset-0 bg-black/40 backdrop-blur-sm z-300 transition-opacity duration-300"
      (click)="onOverlayClick()"
      aria-hidden="true"
    ></div>
  }

  <!-- Layout Container -->
  <div [class]="!toggle.isExamMode() ? 'w-full min-h-dvh lg:pl-65' : 'w-full min-h-dvh'">
    <!-- Sidebar component -->
    @if (!toggle.isExamMode()) {
      <app-sidebar
        [navItems]="navItems()"
        [userName]="userName()"
        [userRole]="userRoleLabel()"
        [activeRoute]="activeRoute()"
        [isStudent]="isStudent()"
        [isAdmin]="isAdmin()"
        [isProfessor]="isProfessor()"
        (navItemSelected)="onNavItemSelected($event)"
      />
    }

    <!-- Main Content Area -->
    <div class="min-h-dvh flex flex-col">
      <!-- Header -->
      @if (!toggle.isExamMode()) {
        <header
          class="sticky top-0 z-30 h-14 px-4 md:px-6 bg-sidebar-bg/90 backdrop-blur-md border-b border-border flex items-center justify-between shadow-sm"
        >
          <div class="flex items-center overflow-hidden">
            @if (isMobile() && !toggle.value()) {
              <button
                type="button"
                class="p-2 -ml-2 rounded-lg text-primary hover:bg-primary/5 transition-colors focus-visible:outline-2 focus-visible:outline-primary/50"
                (click)="toggle.toggle()"
                aria-label="Toggle menu"
              >
                <i class="pi pi-bars text-xl font-bold" aria-hidden="true"></i>
              </button>
            }

            <h1 class="text-lg md:text-xl font-bold text-primary truncate">
              {{ pageTitle() }}
            </h1>
          </div>

          <div class="flex items-center gap-2">
            @if (!hasConfirmedEmail()) {
              <a
                routerLink="/auth/request-email"
                class="group relative inline-flex items-center justify-center h-9 w-9 md:h-10 md:w-10 rounded-full border border-orange-200 bg-orange-50 text-orange shadow-sm transition-all duration-300 hover:border-orange-300 hover:bg-orange-100 focus:outline-none focus:ring-2 focus:ring-orange"
                title="Your email is unconfirmed. Click to update or confirm."
                aria-label="Confirm Email"
              >
                <!-- Pulse effect ring behind the icon -->
                <span
                  class="absolute inset-0 animate-ping rounded-full bg-orange dark:bg-white opacity-20"
                ></span>
                <i class="pi pi-envelope text-sm md:text-base animate-pulse"></i>
              </a>
            }

            <button
              type="button"
              class="group btn relative inline-flex h-9 w-9 items-center justify-center overflow-hidden rounded-full border border-border bg-mode-toggle-bg text-text-secondary shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-primary/40 hover:bg-mode-toggle-hover-bg hover:text-primary hover:shadow-md focus-visible:outline-2 focus-visible:outline-primary/50 md:h-10 md:w-10 lg:hidden"
              [attr.aria-label]="themeLabel()"
              [attr.title]="themeLabel()"
              (click)="toggleTheme()"
            >
              <i
                [class]="
                  isDark() ? 'pi pi-sun text-sm md:text-base' : 'pi pi-moon text-sm md:text-base'
                "
                aria-hidden="true"
              ></i>
            </button>

            <button
              type="button"
              class="hidden btn items-center gap-2 rounded-full border border-border bg-mode-toggle-bg px-3 py-2 text-sm font-semibold text-text-dark shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-primary/40 hover:bg-mode-toggle-hover-bg hover:text-primary hover:shadow-md focus-visible:outline-2 focus-visible:outline-primary/50 lg:inline-flex"
              [attr.aria-label]="themeLabel()"
              [attr.title]="themeLabel()"
              (click)="toggleTheme()"
            >
              <i
                [class]="isDark() ? 'pi pi-sun text-sm' : 'pi pi-moon text-sm'"
                aria-hidden="true"
              ></i>
              <span>{{ desktopThemeLabel() }}</span>
            </button>
            @if (showNotifications()) {
              <button
                type="button"
                class="relative p-2 rounded-full text-text-secondary hover:bg-primary/5 hover:text-primary transition-all group"
                aria-label="Notifications"
              >
                <i class="pi pi-bell text-xl" aria-hidden="true"></i>
                <span
                  class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-sidebar-bg ring-1 ring-red-500/20"
                ></span>
              </button>
            }
          </div>
        </header>
      }

      <main class="flex-1 overflow-x-hidden">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
