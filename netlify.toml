[build]
  command = "npm run build"
  publish = "dist/examflow/browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
package = "netlify-plugin-cloudinary"

[plugins.inputs]
cloudName = "dz4ln213w"          
deliveryType = "upload"          
uploadPreset = "netlify_upload"  